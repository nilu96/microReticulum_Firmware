// Address annotations for the EEPROM hex viewer.
const EEPROM_REGIONS = [
  { from: 0x00, to: 0x0A, label: 'Identity (product/model/HW/serial/date)' },
  { from: 0x9B, to: 0x9B, label: 'INFO_LOCK' },
  { from: 0x9C, to: 0x9C, label: 'SF' },
  { from: 0x9D, to: 0x9D, label: 'CR' },
  { from: 0x9E, to: 0x9E, label: 'TXP' },
  { from: 0x9F, to: 0xA2, label: 'BW (BE32)' },
  { from: 0xA3, to: 0xA6, label: 'FREQ (BE32)' },
  { from: 0xA7, to: 0xA7, label: 'CONF_OK' },
  { from: 0xB0, to: 0xB0, label: 'BT enable' },
  { from: 0xB1, to: 0xB8, label: 'Display' },
  { from: 0xB9, to: 0xB9, label: 'IA disable' },
  { from: 0xBA, to: 0xBB, label: 'WiFi enable / channel' },
];

function buildHexView(u8, regions){
  const wrap = el('div', { class: 'hexview' });
  if (!u8 || u8.length === 0) {
    wrap.appendChild(el('em', { style: { color: 'var(--muted)' } }, 'No data — click "Read EEPROM" above.'));
    return wrap;
  }
  const marks = new Array(u8.length).fill(false);
  if (Array.isArray(regions)) {
    for (const r of regions) for (let i = r.from; i <= r.to && i < u8.length; ++i) marks[i] = true;
  }
  for (let off = 0; off < u8.length; off += 16) {
    const offStr = '0x' + off.toString(16).padStart(4, '0');
    const bytesEl = el('span', { class: 'hx-bytes' });
    let asciiStr = '';
    for (let i = 0; i < 16 && off + i < u8.length; ++i) {
      const b = u8[off + i];
      const span = el('span', marks[off + i] ? { class: 'hx-mark' } : null, b.toString(16).padStart(2, '0'));
      bytesEl.appendChild(span);
      bytesEl.appendChild(document.createTextNode(' '));
      asciiStr += (b >= 0x20 && b <= 0x7E) ? String.fromCharCode(b) : '.';
    }
    const row = el('div', { class: 'hx-row' }, [
      el('span', { class: 'hx-off' }, offStr),
      bytesEl,
      el('span', { class: 'hx-ascii' }, '|' + asciiStr + '|'),
    ]);
    wrap.appendChild(row);
  }
  if (regions && regions.length) {
    const legend = el('div', { class: 'hx-legend' });
    legend.appendChild(el('span', { class: 'hx-mark' }, ' '));
    legend.appendChild(document.createTextNode('Highlighted bytes correspond to known config regions.'));
    wrap.appendChild(legend);
  }
  return wrap;
}

function downloadBlob(name, data){
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { try { document.body.removeChild(a); URL.revokeObjectURL(url); } catch(_) {} }, 200);
}

function buildNcfgEepromPanel(){
  const wrap = el('div', { class: 'ncfg-section' });
  wrap.appendChild(el('h2', null, 'EEPROM'));

  const toolbar = el('div', { class: 'eeprom-toolbar' });
  const readBtn = el('button', null, 'Read EEPROM');
  const readCfgBtn = el('button', null, 'Read WiFi config sector');
  const backupBtn = el('button', null, 'Backup EEPROM to file');
  const status = el('span', { style: { color: 'var(--muted)' } });
  readBtn.onclick = async () => {
    if (!legacy) return;
    readBtn.disabled = true; status.textContent = 'Reading EEPROM…';
    try { state.nodeCfgEeprom.set(await legacy.readEeprom()); status.textContent = ''; }
    catch (e) { status.textContent = ''; showToast('EEPROM read failed: ' + e.message, 'err'); }
    finally { readBtn.disabled = false; }
  };
  readCfgBtn.onclick = async () => {
    if (!legacy) return;
    readCfgBtn.disabled = true; status.textContent = 'Reading WiFi config sector…';
    try { state.nodeCfgCfgSector.set(await legacy.readCfgSector()); status.textContent = ''; }
    catch (e) { status.textContent = ''; showToast('Config sector read failed: ' + e.message, 'err'); }
    finally { readCfgBtn.disabled = false; }
  };
  backupBtn.onclick = async () => {
    if (!legacy) return;
    backupBtn.disabled = true; status.textContent = 'Reading EEPROM for backup…';
    try {
      const u8 = await legacy.readEeprom();
      state.nodeCfgEeprom.set(u8);
      const ts = new Date().toISOString().replace(/[:.]/g,'-').replace(/T/,'_').slice(0,19);
      downloadBlob(`eeprom-backup-${ts}.bin`, u8);
      status.textContent = '';
    } catch (e) { status.textContent = ''; showToast('Backup failed: ' + e.message, 'err'); }
    finally { backupBtn.disabled = false; }
  };
  toolbar.appendChild(readBtn);
  toolbar.appendChild(readCfgBtn);
  toolbar.appendChild(backupBtn);
  toolbar.appendChild(status);
  wrap.appendChild(toolbar);

  // EEPROM hex view
  const eeHost = el('div');
  wrap.appendChild(el('h3', null, 'EEPROM (reserved region, 200 bytes)'));
  wrap.appendChild(eeHost);
  // WiFi config sector hex view
  const cfgHost = el('div');
  wrap.appendChild(el('h3', null, 'WiFi config sector (256 bytes)'));
  wrap.appendChild(cfgHost);

  function updateEe(){
    eeHost.innerHTML = '';
    eeHost.appendChild(buildHexView(state.nodeCfgEeprom.get(), EEPROM_REGIONS));
  }
  function updateCfg(){
    cfgHost.innerHTML = '';
    cfgHost.appendChild(buildHexView(state.nodeCfgCfgSector.get(),
      [ { from: 0x00, to: 0x20, label: 'SSID' },
        { from: 0x21, to: 0x41, label: 'PSK' },
        { from: 0x42, to: 0x45, label: 'Static IP' },
        { from: 0x46, to: 0x49, label: 'Netmask' } ]));
  }
  updateEe();
  updateCfg();

  // Danger zone: EEPROM wipe
  const danger = el('div', { class: 'danger-zone' });
  danger.appendChild(el('h3', null, 'Wipe EEPROM'));
  danger.appendChild(el('p', null,
    'Unlocks and erases the entire 200-byte reserved EEPROM region. The device will reboot. ' +
    'Identity bytes (product/model/HW rev/serial) are NOT preserved — you will need to re-provision the device using rnodeconf -f.'));
  const wipeBtn = el('button', null, 'Wipe EEPROM');
  wipeBtn.onclick = async () => {
    if (!legacy) return;
    const typed = prompt('Type WIPE in uppercase to confirm EEPROM erase:');
    if (typed !== 'WIPE') { showToast('Wipe cancelled', 'ok'); return; }
    try {
      await legacy.wipeEeprom();
      showToast('EEPROM wipe sent — device is erasing and rebooting', 'warn');
    } catch (e) { showToast('Wipe failed: ' + e.message, 'err'); }
  };
  danger.appendChild(wipeBtn);
  wrap.appendChild(danger);

  const cleanups = [
    state.nodeCfgEeprom.subscribe(updateEe),
    state.nodeCfgCfgSector.subscribe(updateCfg),
  ];
  return { node: wrap, cleanups };
}

function buildNodeConfigTab(){
  const root = el('div', { class: 'tab-body config-tab no-pad' });
  const sidenav = el('div', { class: 'sidenav' });
  const detail = el('div', { class: 'sidenav-detail' });
  root.appendChild(sidenav);
  root.appendChild(detail);

  let secCleanups = [];
  function mountSection(sectionId){
    for (const fn of secCleanups) { try { fn(); } catch(_) {} }
    secCleanups = [];
    detail.innerHTML = '';
    const sec = NODE_CONFIG_SCHEMA[sectionId];
    if (!sec) { detail.appendChild(el('em', null, 'Unknown section.')); return; }
    let h;
    if (sec.custom === 'device_info')      h = buildNcfgDeviceInfoPanel();
    else if (sec.custom === 'radio')        h = buildNcfgRadioPanel();
    else if (sec.custom === 'bluetooth')    h = buildNcfgBluetoothPanel();
    else if (sec.custom === 'eeprom')       h = buildNcfgEepromPanel();
    else                                    h = buildNcfgSchemaPanel(sectionId);
    secCleanups = h.cleanups;
    detail.appendChild(h.node);
    // For schema-driven sections, kick off an async read if not loaded yet.
    if (!sec.custom && !state.nodeCfgLoaded.get()[sectionId]) {
      ncfgFetchSection(sectionId);
    }
  }

  const navButtons = new Map();
  function rebuildSidenav(){
    sidenav.innerHTML = '';
    navButtons.clear();
    const active = state.activeNodeCfgTab.get();
    for (const sectionId of Object.keys(NODE_CONFIG_SCHEMA)) {
      const sec = NODE_CONFIG_SCHEMA[sectionId];
      const b = el('button', {
        class: 'sidenav-btn' + (sectionId === active ? ' active' : ''),
        onclick: () => state.activeNodeCfgTab.set(sectionId),
      });
      const lbl = el('span', null, sec.label);
      const dot = el('span', { class: 'dot', style: { display: ncfgDraftCount(sectionId) > 0 ? '' : 'none' } });
      b.appendChild(lbl);
      b.appendChild(dot);
      sidenav.appendChild(b);
      navButtons.set(sectionId, { btn: b, dot });
    }
  }
  function updateNavActive(){
    const active = state.activeNodeCfgTab.get();
    for (const [sectionId, { btn }] of navButtons) btn.classList.toggle('active', sectionId === active);
  }
  function updateNavDots(){
    for (const [sectionId, { dot }] of navButtons) dot.style.display = ncfgDraftCount(sectionId) > 0 ? '' : 'none';
  }

  rebuildSidenav();
  mountSection(state.activeNodeCfgTab.get());

  bodyCleanups.push(state.activeNodeCfgTab.subscribe((id) => { updateNavActive(); mountSection(id); }));
  bodyCleanups.push(state.nodeCfgState.subscribe(updateNavDots));
  bodyCleanups.push(() => { for (const fn of secCleanups) try { fn(); } catch(_) {} });
  return root;
}

// ----- Logs tab (persistent container) -----
const logsBuffer = [];
const logsListeners = new Set();
let logsContainer = null;
let logsFollowing = true;
let logsSavedScrollTop = 0;

function ensureLogsContainer(){
  if (logsContainer) return;
  logsContainer = el('div', { class: 'logs' });
  logsContainer.addEventListener('scroll', () => {
    logsFollowing = (logsContainer.scrollHeight - logsContainer.scrollTop - logsContainer.clientHeight) < 16;
    if (followPill) followPill.style.display = logsFollowing ? 'none' : '';
  });
  for (const line of logsBuffer) logsContainer.appendChild(el('div', { class: 'log-line' }, line));
  logsListeners.add((newLines) => {
    for (const l of newLines) logsContainer.appendChild(el('div', { class: 'log-line' }, l));
    while (logsContainer.childNodes.length > 1000) logsContainer.removeChild(logsContainer.firstChild);
    if (logsFollowing && logsContainer.isConnected) logsContainer.scrollTop = logsContainer.scrollHeight;
  });
}

function clearLogs(){
  logsBuffer.length = 0;
  if (logsContainer) {
    while (logsContainer.firstChild) logsContainer.removeChild(logsContainer.firstChild);
    // After clearing, we're effectively at the bottom of an empty view — re-engage tail.
    logsFollowing = true;
    if (followPill) followPill.style.display = 'none';
  }
}

let followPill = null;
function buildLogsTab(){
  ensureLogsContainer();
  const root = el('div', { class: 'tab-body logs-tab no-pad' });
  const toolbar = el('div', { class: 'logs-toolbar' }, [
    el('button', { onclick: clearLogs, title: 'Clear the log viewer (does not affect the device)' }, 'Clear'),
    el('span', { class: 'spacer' }),
  ]);
  followPill = el('button', { class: 'follow-pill', style: { display: logsFollowing ? 'none' : '' }, onclick: () => {
    logsFollowing = true; followPill.style.display = 'none';
    logsContainer.scrollTop = logsContainer.scrollHeight;
  } }, '▼ Follow tail');
  root.appendChild(toolbar);
  root.appendChild(logsContainer);
  root.appendChild(followPill);
  // Restore scroll on (re)attach. Use rAF so layout is computed before we set
  // scrollTop — queueMicrotask runs before layout and the assignment clamps to 0.
  requestAnimationFrame(() => {
    if (logsFollowing) logsContainer.scrollTop = logsContainer.scrollHeight;
    else logsContainer.scrollTop = logsSavedScrollTop;
  });
  bodyCleanups.push(() => {
    // Save scroll position so we can restore on next mount.
    if (logsContainer && logsContainer.isConnected) {
      logsSavedScrollTop = logsContainer.scrollTop;
      logsFollowing = (logsContainer.scrollHeight - logsContainer.scrollTop - logsContainer.clientHeight) < 16;
    }
  });
  return root;
}

// ----- Body switcher -----
function updateBody(){
  const t = state.activeTab.get();
  if (bodyKey === t) return;
  if (t === 'status') setBody('status', buildStatusTab);
  else if (t === 'nodeconfig') setBody('nodeconfig', buildNodeConfigTab);
  else if (t === 'config') setBody('config', buildConfigTab);
  else if (t === 'logs') setBody('logs', buildLogsTab);
}
updateBody();
state.activeTab.subscribe(updateBody);

// ----- Bottom bar (in place) -----
function buildBottomBar(){
  const wrap = el('div');
  function update(){
    wrap.innerHTML = '';
    const hasLocal = state.hasDraft.get();
    const hasFw = state.firmwareHasDraft.get();
    if (!hasLocal && !hasFw) return;
    const drafts = state.nsState.get();
    let nsCount = 0, fieldCount = 0;
    for (const nsId in drafts) {
      const n = Object.keys(drafts[nsId].draft || {}).length;
      if (n > 0) { nsCount++; fieldCount += n; }
    }
    // Commit and Discard operate on the firmware's staged draft, which only
    // exists once at least one namespace has been Saved. Until then, both
    // buttons are no-ops on the device side, so disable them.
    const label = hasFw
      ? `${fieldCount} field${fieldCount !== 1 ? 's' : ''} pending in ${nsCount} namespace${nsCount !== 1 ? 's' : ''}`
      : `${fieldCount} local edit${fieldCount !== 1 ? 's' : ''} — save a namespace to enable Commit / Discard`;
    const bar = el('div', { class: 'bottombar' }, [
      el('span', null, label),
      el('span', { class: 'spacer' }),
      el('button', { onclick: discardAll, disabled: !hasFw, title: hasFw ? '' : 'No firmware-side draft to discard' }, 'Discard all'),
      el('button', { class: 'primary', onclick: commitAll, disabled: !hasFw, title: hasFw ? '' : 'No firmware-side draft to commit' }, 'Commit all'),
    ]);
    wrap.appendChild(bar);
  }
  update();
  state.hasDraft.subscribe(update);
  state.firmwareHasDraft.subscribe(update);
  state.nsState.subscribe(update);
  return wrap;
}
slots.bottombar.appendChild(buildBottomBar());

// ===== SELFTEST-BEGIN — stripped by webconsole/package.sh =====
// ===== Self-tests =====
async function runSelfTests(){
  const out = [];
  const ok = (n, c, info) => out.push((c ? 'OK  ' : 'FAIL') + ' ' + n + (info ? ' [' + info + ']' : ''));
  try {
    const p = new Packer();
    p.arr(3); p.int(1); p.int(42);
    p.map(2);
    p.int(1); p.str('hello');
    p.int(2); p.bool(true);
    const u = new Unpacker(p.result());
    const v = u.next();
    ok('msgpack envelope', Array.isArray(v) && v.length === 3);
    ok('msgpack op', v[0] === 1);
    ok('msgpack seq', v[1] === 42);
    ok('msgpack payload Map', v[2] instanceof Map);
    ok('msgpack map[1]', v[2].get(1) === 'hello');
    ok('msgpack map[2]', v[2].get(2) === true);
  } catch (e) { ok('msgpack roundtrip', false, e.message); }
  try {
    const p2 = new Packer(); p2.int(-300); p2.int(70000); p2.float(3.14159265);
    const u2 = new Unpacker(p2.result());
    ok('msgpack int -300', u2.next() === -300);
    ok('msgpack uint 70000', u2.next() === 70000);
    const f = u2.next();
    ok('msgpack float', Math.abs(f - 3.14159265) < 1e-9);
  } catch (e) { ok('msgpack numerics', false, e.message); }
  try {
    const payload = new Uint8Array([0x01, FEND, FESC, 0xFF, FEND, 0x02]);
    const enc = kissEncode(0x86, payload);
    let got = null;
    const dec = new KissDecoder((cmd, p) => { got = { cmd, p }; });
    dec.feed(enc);
    ok('kiss cmd', got && got.cmd === 0x86);
    ok('kiss payload length', got && got.p.length === payload.length);
    let same = true;
    if (got) for (let i = 0; i < payload.length; ++i) if (got.p[i] !== payload[i]) { same = false; break; }
    ok('kiss payload bytes', same);
  } catch (e) { ok('kiss roundtrip', false, e.message); }
  try {
    const st = {};
    decodeStatusFrame(0x27, new Uint8Array([1, 88]), st);
    ok('status BAT state', st.batteryState === 1);
    ok('status BAT %', st.batteryPercent === 88);
    decodeStatusFrame(0x26, new Uint8Array([0,8, 1,0, 0,4, 0,10, 0,1, 0,2]), st);
    ok('status PHYPRM symTime', st.symbolTimeUs === 8);
    ok('status PHYPRM symRate', st.symbolRate === 256);
    ok('status PHYPRM difs', st.difsMs === 2);
    decodeStatusFrame(0x25, new Uint8Array([0x27,0x10, 0x13,0x88, 0x03,0xE8, 0x07,0xD0, 60, 100, 0xFF]), st);
    ok('status CHTM airtimeShort', Math.abs(st.airtimeShort - 1.0) < 1e-9);
    ok('status CHTM airtimeLong', Math.abs(st.airtimeLong - 0.5) < 1e-9);
    ok('status CHTM currentRssi', st.currentRssi === 60 - RSSI_OFFSET);
    ok('status CHTM noiseFloor', st.noiseFloor === 100 - RSSI_OFFSET);
    ok('status CHTM interference null', st.interferenceRssi === null);
    decodeStatusFrame(0x23, new Uint8Array([57]), st);
    ok('status RSSI single', st.lastRssi === 57 - RSSI_OFFSET);
    decodeStatusFrame(0x24, new Uint8Array([0xFC]), st);
    ok('status SNR signed', Math.abs(st.lastSnr - (-1.0)) < 1e-9);
    // CMD_STAT_TEMP: firmware adds PMU_TEMP_OFFSET=120; we subtract it back.

    ok('status TEMP 171→51°C', st.temperatureC === 51);
    decodeStatusFrame(0x29, new Uint8Array([89]), st);   // PMU_TEMP_MIN-1 sentinel
    ok('status TEMP sentinel→null', st.temperatureC === null);
    decodeStatusFrame(0x29, new Uint8Array([145]), st);  // 145 - 120 = 25°C
    ok('status TEMP 145→25°C', st.temperatureC === 25);
  } catch (e) { ok('status decoder', false, e.message); }
  // Firmware version is rendered as decimal "major.minor" (rnodeconf convention),
  // not hex. MIN_VERS=0x56 → "86", not "56".
  try {
    const fmt = (b) => b.length >= 2 ? `${b[0]}.${b[1].toString().padStart(2,'0')}` : null;
    ok('fwVersion 0x01,0x56 → 1.86', fmt(new Uint8Array([0x01, 0x56])) === '1.86');
    ok('fwVersion 0x02,0x0a → 2.10', fmt(new Uint8Array([0x02, 0x0a])) === '2.10');
  } catch (e) { ok('fwVersion format', false, e.message); }
  // BytesList: round-trip through MsgPack packer/unpacker.
  try {
    const a = new Uint8Array([0x01,0x02,0x03,0x04, 0x05,0x06,0x07,0x08, 0x09,0x0a,0x0b,0x0c, 0x0d,0x0e,0x0f,0x10]);
    const b = new Uint8Array([0xff, 0xee, 0xdd, 0xcc]);

    ok('BytesList entry 0 length', decoded[0].length === 16);
    ok('BytesList entry 0 bytes',
      decoded[0] instanceof Uint8Array && decoded[0][0] === 0x01 && decoded[0][15] === 0x10);
    ok('BytesList entry 1 bytes',

  } catch (e) { ok('BytesList round-trip', false, e.message); }

  try {
    const x1 = [new Uint8Array([1,2,3]), new Uint8Array([4,5])];
    const x2 = [new Uint8Array([1,2,3]), new Uint8Array([4,5])];
    const x3 = [new Uint8Array([1,2,3]), new Uint8Array([4,6])];

  } catch (e) { ok('parseBytesListHex', false, e.message); }
  // validateValue for BytesList with constraints

    const ok16 = new Uint8Array(16);
    const ok16b = new Uint8Array(16);
    ok('BytesList validate empty', validateValue(f, []) === null);
    ok('BytesList validate ok', validateValue(f, [ok16, ok16b]) === null);
    ok('BytesList validate too few bytes', validateValue(f, [new Uint8Array(15)]) != null);
    ok('BytesList validate too many entries',
      validateValue(f, [ok16, ok16b, new Uint8Array(16), new Uint8Array(16), new Uint8Array(16)]) != null);
  } catch (e) { ok('BytesList validate', false, e.message); }
  // FF.WRITE_ONLY constant and renderer routing
  try {
    ok('FF.WRITE_ONLY = 16', FF.WRITE_ONLY === 16);
    ok('FF.READ_ONLY  = 4',  FF.READ_ONLY  === 4);
    // RO row renders as a static value display, never as a draft-bearing input.
    const fRO = { id: 99, name: 'rssi_dbm', label: 'RSSI', type: FT.Int, flags: FF.READ_ONLY };
    const hRO = buildFieldRow(1, fRO);
    ok('RO field row class', hRO.row._classes.has('ro-info'));
    ok('RO field hasDraftError false', hRO.hasDraftError() === false);
    // WO row renders input + Send button. Never participates in draft state.
    const fWO = { id: 100, name: 'reboot_in_seconds', label: 'Reboot in (seconds)', type: FT.Int, flags: FF.WRITE_ONLY, minI: 0, maxI: 60 };
    const hWO = buildFieldRow(1, fWO);
    ok('WO field row class', hWO.row._classes.has('wo-action'));
    ok('WO field hasDraftError false', hWO.hasDraftError() === false);
    // renderReadOnlyValue type formatting
    ok('RO Bool render true',  renderReadOnlyValue({ type: FT.Bool }, true).text === '✓ true');
    ok('RO Bool render false', renderReadOnlyValue({ type: FT.Bool }, false).text === '✗ false');
    ok('RO Int+unit',          renderReadOnlyValue({ type: FT.Int, unit: 'dBm' }, -84).text === '-84 dBm');
    ok('RO Enum label',        renderReadOnlyValue({ type: FT.Enum, enumValues: [0,1], enumLabels: ['off','on'] }, 1).text === 'on (1)');
    ok('RO Bytes hex',         renderReadOnlyValue({ type: FT.Bytes }, new Uint8Array([0xab,0xcd])).text === 'abcd');
    ok('RO Bytes empty',       renderReadOnlyValue({ type: FT.Bytes }, new Uint8Array(0)).empty === true);
    ok('RO BytesList empty',   renderReadOnlyValue({ type: FT.BytesList }, []).empty === true);
    ok('RO null →"—"',         renderReadOnlyValue({ type: FT.Int }, null).empty === true);
  } catch (e) { ok('RO/WO renderers', false, e.message); }
  // Namespace-tree helpers (schema v2 with parentId)
  try {
    const schema = { namespaces: [
      { id: 1, name: 'reticulum', parentId: 0, fields: [] },
      { id: 2, name: 'transport', parentId: 1, fields: [] },
      { id: 3, name: 'interfaces', parentId: 2, fields: [] },
      { id: 4, name: 'lora',      parentId: 3, fields: [] },
      { id: 5, name: 'serial',    parentId: 3, fields: [] },
      { id: 101, name: 'general', parentId: 0, fields: [] },
    ]};
    ok('tree: getNsById hit',  getNsById(schema, 4).name === 'lora');
    ok('tree: getNsById miss', getNsById(schema, 999) === null);
    ok('tree: roots',          getChildrenOf(schema, 0).map(n => n.id).join(',') === '1,101');
    ok('tree: children of 3',  getChildrenOf(schema, 3).map(n => n.id).join(',') === '4,5');
    // Depth-first: 1 → 2 → 3 → 4 → 5
    ok('tree: DFS of 1',       getNsTreeIds(schema, 1).join(',') === '1,2,3,4,5');
    ok('tree: DFS of 101',     getNsTreeIds(schema, 101).join(',') === '101');
    // Draft rollup
    state.nsState.set({
      1: { committed:{}, draft:{ 1: 'a' } },
      2: { committed:{}, draft:{} },
      4: { committed:{}, draft:{ 1: 'x', 2: 'y' } },
    });
    ok('tree: draft count root 1', nsTreeDraftCount(schema, 1) === 3);
    ok('tree: draft count root 101', nsTreeDraftCount(schema, 101) === 0);
    state.nsState.set({});
  } catch (e) { ok('tree helpers', false, e.message); }
  // Schema parser: v2 layout [id, name, parent_id, fields]
  try {
    // Build a synthetic GetSchema response and parse it via a stub client.
    const sched = (entries) => {
      const u = entries; // already a Map-based decoded body
      const namespaces = [];
      for (const nsEntry of u) {
        if (!Array.isArray(nsEntry) || nsEntry.length < 3) continue;
        const v2 = nsEntry.length >= 4;
        const parentId = v2 ? Number(nsEntry[2] || 0) : 0;
        const fieldsRaw = v2 ? nsEntry[3] : nsEntry[2];
        namespaces.push({ id: Number(nsEntry[0]), name: String(nsEntry[1]), parentId, fields: Array.isArray(fieldsRaw) ? fieldsRaw : [] });
      }
      return namespaces;
    };
    // v2 entry: [1, 'reticulum', 0, []]
    const v2parsed = sched([[1, 'reticulum', 0, []]]);
    ok('schema v2 parses parentId=0', v2parsed.length === 1 && v2parsed[0].parentId === 0);
    // v2 entry with non-zero parentId: [2, 'transport', 1, []]
    const v2child = sched([[2, 'transport', 1, []]]);
    ok('schema v2 parses parentId=1', v2child[0].parentId === 1);
    // v1 entry: [42, 'legacy', []]
    const v1parsed = sched([[42, 'legacy', []]]);
    ok('schema v1 back-compat', v1parsed[0].parentId === 0 && Array.isArray(v1parsed[0].fields));
  } catch (e) { ok('schema parser', false, e.message); }
  // Multi-level nesting: panel for "Metrics" should show "Interfaces" as a
  // depth-1 section (h3) and "LoRa" as a depth-2 sub-section (h4), with
  // distinct CSS classes and indent values.
  try {
    const schema = { namespaces: [
      { id: 4, name: 'Metrics',    parentId: 0, fields: [] },
      { id: 5, name: 'Interfaces', parentId: 4, fields: [] },
      { id: 6, name: 'LoRa',       parentId: 5, fields: [] },
    ]};
    state.schema.set(schema);
    state.nsState.set({ 4:{committed:{},draft:{}}, 5:{committed:{},draft:{}}, 6:{committed:{},draft:{}} });
    state.nsLoaded.set({ 4:true, 5:true, 6:true });
    const { node } = buildNamespacePanel(4);
    // Walk the rendered node to find each heading.
    let h2=null, h3=null, h4=null;
    (function walk(n){
      if (!n) return;
      if (n.tagName === 'h2' && n._classes && n._classes.has('ns-h')) h2 = n;
      if (n.tagName === 'h3' && n._classes && n._classes.has('ns-sub')) h3 = n;
      if (n.tagName === 'h4' && n._classes && n._classes.has('ns-sub')) h4 = n;
      for (const c of (n._children||[])) walk(c);
    })(node);
    const text = (n) => n ? (n._children||[]).filter(c => c && c.nodeType === 3).map(c => c.textContent).join('') : '';
    ok('depth-0 root h2 "Metrics"',    !!h2 && text(h2) === 'Metrics');
    ok('depth-1 "Interfaces" → h3',    !!h3 && text(h3) === 'Interfaces');
    ok('depth-1 has depth-1 class',    !!h3 && h3._classes.has('depth-1'));
    ok('depth-2 "LoRa" → h4',          !!h4 && text(h4) === 'LoRa');
    ok('depth-2 has depth-2 class',    !!h4 && h4._classes.has('depth-2'));
    ok('depth-1 indent 0px',            !!h3 && h3.style && h3.style.marginLeft === '0px');
    ok('depth-2 indent 16px',           !!h4 && h4.style && h4.style.marginLeft === '16px');
    // Cleanup
    state.schema.set(null); state.nsState.set({}); state.nsLoaded.set({});
  } catch (e) { ok('multi-level nesting', false, e.message); }
  // WiFi readFn: decode SSID/PSK/IP/NM from a synthetic CONFIG sector, and
  // mode/channel from a synthetic main-EEPROM image. This is the read path
  // that lets the Refresh button (and post-reboot reload) display actual
  // persisted values instead of falling back to schema defaults.
  try {
    const wifi = NODE_CONFIG_SCHEMA.wifi;
    ok('WiFi schema has readFn', typeof wifi.readFn === 'function');
    // Synthetic CONFIG sector: SSID="MyNet", PSK="hunter2", IP=192.168.1.42, NM=255.255.255.0
    const cfg = new Uint8Array(256);
    const ssid = new TextEncoder().encode('MyNet');
    const psk  = new TextEncoder().encode('hunter2');
    cfg.set(ssid, 0x00);                       // SSID at 0x00 (null-terminated by the surrounding zeros)
    cfg.set(psk,  0x21);                       // PSK at 0x21
    cfg[0x42] = 192; cfg[0x43] = 168; cfg[0x44] = 1; cfg[0x45] = 42;
    cfg[0x46] = 255; cfg[0x47] = 255; cfg[0x48] = 255; cfg[0x49] = 0;
    // Synthetic main EEPROM: mode=STA(1) at 0xBA, channel=6 at 0xBB.
    const ee = new Uint8Array(200);
    for (let i = 0; i < 200; ++i) ee[i] = 0xFF;   // simulate uninitialised
    ee[0xBA] = 0x01; ee[0xBB] = 0x06;
    const stubLegacy = { readCfgSector: async () => cfg, readEeprom: async () => ee };
    const out = await wifi.readFn(stubLegacy);
    ok('WiFi readFn ssid',    out.ssid === 'MyNet');
    ok('WiFi readFn psk',     out.psk  === 'hunter2');
    ok('WiFi readFn ip',      out.ip   === '192.168.1.42');
    ok('WiFi readFn nm',      out.nm   === '255.255.255.0');
    ok('WiFi readFn mode',    out.mode === 0x01);
    ok('WiFi readFn channel', out.channel === 6);
    // Uninitialised EEPROM ⇒ no SSID/PSK exposed and no mode/channel surfaced.
    const fresh = new Uint8Array(256).fill(0xFF);
    const ee2 = new Uint8Array(200).fill(0xFF);
    const out2 = await wifi.readFn({ readCfgSector: async () => fresh, readEeprom: async () => ee2 });
    ok('WiFi readFn fresh ssid empty',    out2.ssid === '');
    ok('WiFi readFn fresh ip = DHCP',     out2.ip   === '0.0.0.0');
    ok('WiFi readFn fresh mode absent',   !('mode' in out2));
    ok('WiFi readFn fresh channel absent',!('channel' in out2));
  } catch (e) { ok('WiFi readFn', false, e.message); }
  // ----- Node Config codec round-trips -----
  try {
    // be32 frequency encode/decode (867500000 Hz = 0x33B4FFE0)
    const freq = NCFG_ENC.be32.enc(867500000);
    ok('ncfg be32 enc length', freq.length === 4);
    ok('ncfg be32 enc bytes', freq[0]===0x33 && freq[1]===0xB4 && freq[2]===0xFF && freq[3]===0xE0);
    ok('ncfg be32 dec', NCFG_ENC.be32.dec(freq) === 867500000);
    // u8 SF
    ok('ncfg u8 enc', NCFG_ENC.u8.enc(7)[0] === 7);
    ok('ncfg u8 dec', NCFG_ENC.u8.dec(new Uint8Array([12])) === 12);
    // i8 TXP signed
    ok('ncfg i8 enc -9',  NCFG_ENC.i8.enc(-9)[0] === (256 - 9));
    ok('ncfg i8 dec -1',  NCFG_ENC.i8.dec(new Uint8Array([0xFF])) === -1);
    ok('ncfg i8 dec  22', NCFG_ENC.i8.dec(new Uint8Array([22])) === 22);
    // str null-terminated
    const sBytes = NCFG_ENC.str.encStr('hello', 32);
    ok('ncfg str null-term', sBytes.length === 6 && sBytes[5] === 0);
    // ip4 round-trip
    const ip = NCFG_ENC.ip4.enc('192.168.1.42');
    ok('ncfg ip4 enc', ip[0]===192 && ip[1]===168 && ip[2]===1 && ip[3]===42);
    ok('ncfg ip4 dec', NCFG_ENC.ip4.dec(ip) === '192.168.1.42');
    ok('ncfg ip4 DHCP zero', NCFG_ENC.ip4.dec(new Uint8Array([0,0,0,0])) === '0.0.0.0');
  } catch (e) { ok('ncfg codec', false, e.message); }
  // KISS-frame assembly for the legacy opcodes
  try {
    // BT_CTRL "on" → FEND 0x46 0x01 FEND
    const f = kissEncode(CMD_BT_CTRL, new Uint8Array([0x01]));
    ok('ncfg BT_CTRL frame', f.length === 4 && f[0]===0xC0 && f[1]===0x46 && f[2]===0x01 && f[3]===0xC0);
    // CMD_CONF_SAVE with empty payload → FEND 0x53 FEND
    const cs = kissEncode(CMD_CONF_SAVE, new Uint8Array(0));
    ok('ncfg CMD_CONF_SAVE frame', cs.length === 3 && cs[0]===0xC0 && cs[1]===0x53 && cs[2]===0xC0);
    // CMD_UNLOCK_ROM with magic byte
    const ur = kissEncode(CMD_UNLOCK_ROM, new Uint8Array([ROM_UNLOCK_BYTE]));
    ok('ncfg ROM unlock frame', ur.length === 4 && ur[1]===0x59 && ur[2]===0xF8);
  } catch (e) { ok('ncfg frames', false, e.message); }
  // LegacyClient.query() round-trip via a synthetic transport.
  try {
    const sent = [];
    const fakeT = { send: async (b) => { sent.push(b); }, onBytes: ()=>{} };
    const fakeProv = { onLegacyFrame: null, _onFrame: () => {} };
    const lc = new LegacyClient(fakeProv, fakeT);
    let resolvedVal = null;
    lc.query(CMD_FREQUENCY, NCFG_ENC.be32.query(), 1000).then(p => { resolvedVal = NCFG_ENC.be32.dec(p); });
    // Yield once so the lc.query's send() promise can land its handler.
    await Promise.resolve();
    // Simulate the device's echoed response by invoking onLegacyFrame.
    fakeProv.onLegacyFrame(CMD_FREQUENCY, new Uint8Array([0x33, 0xB4, 0xFF, 0xE0]));
    await Promise.resolve(); await Promise.resolve();
    ok('LegacyClient query echo', resolvedVal === 867500000);
    ok('LegacyClient query sent one frame', sent.length === 1);
  } catch (e) { ok('LegacyClient query', false, e.message); }
  // Hex-viewer rendering
  try {
    const u = new Uint8Array(32);
    for (let i = 0; i < 32; ++i) u[i] = i;
    const view = buildHexView(u, [{ from: 0x9C, to: 0x9C, label: 'SF' }]);
    // Top-level wrapper has class hexview; should contain 2 rows (16-byte each)
    let rowCount = 0;
    function walk(n) { if (!n || !n._children) return; for (const c of n._children) { if (c._classes && c._classes.has && c._classes.has('hx-row')) rowCount++; walk(c); } }
    walk(view);
    ok('hexview row count', rowCount === 2);
  } catch (e) { ok('hexview', false, e.message); }
  document.getElementById('app').innerHTML = '<pre>' + out.join('\n') + '</pre>';
}
if (location.search.indexOf('selftest=1') !== -1) runSelfTests();
// ===== SELFTEST-END =====
})();
