    // sides back in sync.

function validateValue(field, value){
  if (value == null) return null;
  if (field.type === FT.Int || field.type === FT.Enum) {
    const n = Number(value);
    if (!Number.isFinite(n) || Math.trunc(n) !== n) return 'must be an integer';
    if (field.minI != null && n < Number(field.minI)) return `min ${field.minI}`;
    if (field.maxI != null && n > Number(field.maxI)) return `max ${field.maxI}`;
  } else if (field.type === FT.Float) {
    const n = Number(value);
    if (!Number.isFinite(n)) return 'must be a number';
    if (field.minF != null && n < Number(field.minF)) return `min ${field.minF}`;
    if (field.maxF != null && n > Number(field.maxF)) return `max ${field.maxF}`;
  } else if (field.type === FT.String) {
    if (field.maxLen != null && String(value).length > Number(field.maxLen)) return `max length ${field.maxLen}`;
  } else if (field.type === FT.Bytes) {
    const len = value instanceof Uint8Array ? value.length : 0;
    if (field.maxLen != null && len > Number(field.maxLen)) return `max length ${field.maxLen} bytes`;

    if (!Array.isArray(value)) return 'must be a list';
    const max = field.maxCount != null ? Number(field.maxCount) : 0;
    if (max > 0 && value.length > max) return `max ${max} entries`;
    const sz = field.elementSize != null ? Number(field.elementSize) : 0;
    for (let i = 0; i < value.length; ++i) {
      const e = value[i];
      if (!(e instanceof Uint8Array)) return `entry ${i+1}: not bytes`;
      if (sz > 0 && e.length !== sz) return `entry ${i+1}: must be exactly ${sz} bytes (got ${e.length})`;

}

// ===== Namespace tree (schema v2: namespace.parentId, parentId==0 == root) =====
function getNsById(schema, nsId){
  if (!schema || !Array.isArray(schema.namespaces)) return null;
  return schema.namespaces.find(n => Number(n.id) === Number(nsId)) || null;

// Direct children of a namespace id (or roots if parentId==0).
function getChildrenOf(schema, parentId){
  if (!schema || !Array.isArray(schema.namespaces)) return [];
  return schema.namespaces.filter(n => Number(n.parentId || 0) === Number(parentId));

// Depth-first traversal of a namespace and its descendants. Returns ids in
// the order: root, child1, child1.grandchild1, ..., child2, child2.gc1, ...
// Used for fetching the whole tree in one go and for rendering sub-sections
// in a stable order.
function getNsTreeIds(schema, rootId){
  const out = [];
  if (!schema) return out;
  const walk = (id) => {
    const ns = getNsById(schema, id);
    if (!ns) return;
    out.push(Number(ns.id));
    for (const child of getChildrenOf(schema, ns.id)) walk(child.id);

}
// Total drafted-field count across a namespace and all its descendants. Used
// for the sidenav "•" indicator on root namespaces.
function nsTreeDraftCount(schema, rootId, ctx){
  let n = 0;
  for (const id of getNsTreeIds(schema, rootId)) n += nsDraftCount(id, ctx);
  return n;
}

// ===== Toasts =====
function showToast(text, kind){
  const host = document.getElementById('toasts');
  const t = el('div', { class: 'toast ' + (kind || 'info') }, text);
  host.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 250);
  }, 3000);
}

// ===== Operations =====
// Collect drafted FF_REBOOT_REQUIRED field values across the given namespace
// ids so commitAll can stash them into the pending-reboot overlay before the
// firmware accepts them (and starts returning stale runtime values via the
// getter on subsequent reads). Excludes WRITE_ONLY (not echoed) and READ_ONLY
// (no setter, never drafted) flags.
// Returns: { [nsId]: { [fid]: value } }
function snapshotPendingRebootValues(treeIds){
  const schema = state.schema.get();
  const stateMap = state.nsState.get();
  const out = {};
  if (!schema) return out;
  for (const id of treeIds) {
    const nsObj = stateMap[id]; if (!nsObj || !nsObj.draft) continue;
    const ns = getNsById(schema, id); if (!ns || !Array.isArray(ns.fields)) continue;
    const slice = {};
    for (const fidStr in nsObj.draft) {
      const fid = Number(fidStr);
      const f = ns.fields.find(ff => ff.id === fid);
      if (!f) continue;
      const flags = f.flags|0;
      if (!(flags & FF.REBOOT_REQUIRED)) continue;
      if (flags & (FF.WRITE_ONLY | FF.READ_ONLY)) continue;
      slice[fid] = nsObj.draft[fid];
    }
    if (Object.keys(slice).length > 0) out[id] = slice;
  }
  return out;
}

async function saveNamespace(nsId){
  // Save the namespace AND all its descendants in a single SetState request.
  // Drafts from any sub-section in the tree contribute to the payload.
  if (!client) return;
  const schema = state.schema.get();
  if (!schema) return;
  const treeIds = getNsTreeIds(schema, nsId);
  const stateMap = {};
  let totalDraftFields = 0;
  for (const id of treeIds) {
    const nsObj = state.nsState.get()[id];
    if (!nsObj) continue;
    const ns = getNsById(schema, id);
    if (!ns) continue;
    const fields = {};
    for (const fidStr in nsObj.draft) {
      const fid = Number(fidStr);
      const f = ns.fields.find(ff => ff.id === fid);
      if (!f) continue;
      fields[fid] = { type: f.type, value: nsObj.draft[fid] };
    }
    if (Object.keys(fields).length > 0) { stateMap[id] = fields; totalDraftFields += Object.keys(fields).length; }
  }
  if (Object.keys(stateMap).length === 0) return;
  try {
    const r = await client.setState(stateMap);
    // Spread server-side field errors back to their owning namespace.
    const perNs = {};
    for (const fe of r.fieldErrors) {
      if (!perNs[fe.ns]) perNs[fe.ns] = {};
      perNs[fe.ns][fe.field] = fe.codeName;
    }
    state.nsServerErrors.update(s => { for (const id of treeIds) s[id] = perNs[id] || {}; });
    state.nsLoaded.update(s => { for (const id of treeIds) delete s[id]; });
    if (r.applied > 0) state.firmwareHasDraft.set(true);
    await fetchNamespaceIfNeeded(nsId);
    const ns = getNsById(schema, nsId);
    const label = ns ? ns.name : String(nsId);
    if (r.fieldErrors.length === 0) {
      showToast(`Saved ${r.applied} field${r.applied !== 1 ? 's' : ''} to "${label}"`, 'ok');
    } else {
      showToast(`Saved with ${r.fieldErrors.length} error${r.fieldErrors.length !== 1 ? 's' : ''}`, 'warn');
    }
  } catch (e) {
    showToast('Save failed: ' + e.message, 'err');
  }
}
async function revertNamespace(nsId){

  // namespace and all its descendants, then re-fetch the tree.

  const treeIds = schema ? getNsTreeIds(schema, nsId) : [Number(nsId)];
  try {
    await client.discard(treeIds);
    state.nsServerErrors.update(s => { for (const id of treeIds) delete s[id]; });
    state.nsLoaded.update(s => { for (const id of treeIds) delete s[id]; });
    await fetchNamespaceIfNeeded(nsId);
    showToast('Reverted draft changes', 'ok');
  } catch (e) {
    showToast('Revert failed: ' + e.message, 'err');

async function refreshNamespace(nsId){

  const treeIds = schema ? getNsTreeIds(schema, nsId) : [Number(nsId)];

    const nsStateNow = state.nsState.get();
    const allDraftNsIds = Object.keys(nsStateNow)

    state.nsLoaded.set({});
    state.nsState.set({});
    recomputeHasDraft();
    state.firmwareHasDraft.set(false);
    // Banner is derived from state.info.needsReboot; re-fetching info updates it.

    const cur = state.activeNsTab.get();
    if (cur != null) await fetchNamespaceIfNeeded(cur);

    recomputeHasDraft();
    state.firmwareHasDraft.set(false);
    state.pendingRebootOverlay.set({});
    const cur = state.activeNsTab.get();
    if (cur != null) await fetchNamespaceIfNeeded(cur);
    showToast(`Discarded ${r.applied} pending change${r.applied !== 1 ? 's' : ''}`, 'ok');
  } catch (e) {
    showToast('Discard failed: ' + e.message, 'err');
  }
}
async function reboot(){
  if (!client) return;
  const auto = state.autoReconnect.get();
  const msg = auto
    ? 'Reboot the device now? The console will automatically reconnect.'
    : 'Reboot the device now? You will be disconnected.';
  if (!confirm(msg)) return;
  try {
    // Prefer the first-class Provisioning OP.Reboot — works over any
    // transport, including RNS where legacy KISS CMD_RESET is filtered.
    // UnknownOp (code 2) means the device's microReticulum is older than
    // OP.Reboot; fall back to the legacy KISS path.
    try {
      await client.requestReboot();
    } catch (e) {
      if (e && Number(e.code) === 2) await client.reboot();
      else throw e;
    }
    // Reflect the imminent disconnect immediately, AND force-close the transport.
    // The force-close matters on UART-to-USB bridges (CP2102, CH340, etc) where
    // the host's serial connection survives the ESP32 reset — without it, the
    // read loop never observes a disconnect, 'closed' never fires, startReconnect
    // never runs, and the UI is stuck in "Reconnecting…" forever. On RNS it
    // also fires rns.link.close so MeshChatX evicts its cached Link.
    if (auto) state.reconnecting.set(true);
    showToast(auto
      ? 'Reboot command sent — reconnecting…'
      : 'Reboot command sent — device is restarting', 'ok');
    if (transport && transport.forceClose) {
      try { await transport.forceClose(); } catch(_) {}
    }
  } catch (e) {
    showToast('Reboot failed: ' + e.message, 'err');
  }
}
async function factoryReset(){
  if (!client) return;
  if (!confirm('Factory-reset all namespaces? This cannot be undone.')) return;
  try {
    const r = await client.factoryReset();
    state.nsLoaded.set({});
    state.nsState.set({});
    state.nsServerErrors.set({});
    recomputeHasDraft();
    state.firmwareHasDraft.set(false);
    state.pendingRebootOverlay.set({});
    // Banner is derived from state.info.needsReboot; refresh to pick up the change.
    try { state.info.set(await client.getInfo()); } catch(_) {}
    showToast('Factory reset complete' + (r.needsReboot ? ' — reboot recommended' : ''), r.needsReboot ? 'warn' : 'ok');
  } catch (e) {
    showToast('Factory reset failed: ' + e.message, 'err');
  }
}

// every tab, not just Status. Shown when EITHER the Provisioning subsystem
// has staged reboot-required changes (info.needsReboot) OR a Node Config
// save touched a reboot-required section (state.nodeCfgNeedsReboot).
// Cleared on reboot.
function buildRebootBanner(){
  const banner = el('div', { class: 'notice', style: {
    display: 'none', alignItems: 'center', gap: '12px',
    margin: '8px 12px 0', borderRadius: '4px',
  } });
  const msg = el('span', { style: { flex: '1' } }, 'Reboot recommended to apply committed changes.');
  const btn = el('button', { class: 'primary', onclick: reboot }, 'Reboot now');
  banner.appendChild(msg);
  banner.appendChild(btn);
  function update(){
    const info = state.info.get();
    const connected = state.conn.get().state === 'connected';
    const show = ((info && info.needsReboot) || state.nodeCfgNeedsReboot.get());
    banner.style.display = show ? 'flex' : 'none';
    btn.disabled = !connected;
  }
  state.info.subscribe(update);
  state.nodeCfgNeedsReboot.subscribe(update);

}

// Cleanup callbacks for the body's currently-mounted tab. Run before building a new
// tab so the new tab's builder can push its own cleanups into the (now empty) list.
// Critical: take a *build function*, not an already-built node. Building the node
// before clearing cleanups would tear down the new tab's subscriptions immediately.
let bodyCleanups = [];
let bodyKey = null;
function setBody(key, buildFn){
  for (const fn of bodyCleanups) { try { fn(); } catch(_) {} }
  bodyCleanups = [];
  const node = buildFn();
  slots.body.innerHTML = '';
  slots.body.appendChild(node);
  bodyKey = key;
}

  rnsHost.appendChild(rnsUrlInput);
  rnsHost.appendChild(rnsHashInput);
  rnsHost.appendChild(rnsAspectInput);
  rnsHost.appendChild(rnsIdentLabel);
  const connectBtn = el('button');
  const disconnectBtn = el('button', null, 'Disconnect');
  const autoCheckbox = el('input', { type: 'checkbox' });
  autoCheckbox.checked = state.autoReconnect.get();
  autoCheckbox.onchange = (e) => state.autoReconnect.set(e.target.checked);
  const autoLabel = el('label', { style: { display: 'inline-flex', alignItems: 'center', gap: '4px', cursor: 'pointer', color: 'var(--muted)' }, title: 'Reconnect automatically after a reboot to capture early boot logs' }, [autoCheckbox, 'auto-reconnect']);
  const pill = el('span', { class: 'pill' });
  const opts = [['serial','Serial'], ['ble','Bluetooth'], ['ws','WebSocket'], ['rns','RNS (via MeshChatX)']];
  for (const [v, lbl] of opts) sel.appendChild(el('option', { value: v }, lbl));
  sel.value = state.transportName.get();
  sel.onchange = (e) => state.transportName.set(e.target.value);

  disconnectBtn.onclick = doDisconnect;

  root.appendChild(el('strong', null, 'RNode Console'));
  root.appendChild(el('span', { class: 'sep' }));
  root.appendChild(el('label', null, 'Transport: '));
  root.appendChild(sel);
  root.appendChild(wsHost);
  root.appendChild(rnsHost);
  root.appendChild(connectBtn);
  root.appendChild(disconnectBtn);
  root.appendChild(autoLabel);
  root.appendChild(el('span', { class: 'spacer' }));
  root.appendChild(pill);

  // Elapsed-time ticker state for the connecting badge. Declared outside
  // update() so it survives across calls (it's the same closure each time).
  let connectingStartedAt = null;
  let elapsedTimer = null;
  function update(){
    const conn = state.conn.get();
    const tname = state.transportName.get();
    const reconnecting = state.reconnecting.get();
    const connecting = conn.state === 'connecting' && !reconnecting;
    const connected = conn.state === 'connected';
    sel.disabled = connecting || connected || reconnecting;
    if (sel.value !== tname) sel.value = tname;
    const showWs = (tname === 'ws');
    wsInput.style.display = showWs ? '' : 'none';
    if (showWs) {
      if (document.activeElement !== wsInput && wsInput.value !== state.wsUrl.get()) wsInput.value = state.wsUrl.get();
      wsInput.disabled = connecting || connected || reconnecting;
    }
    const showRns = (tname === 'rns');
    rnsHost.style.display = showRns ? '' : 'none';
    if (showRns) {
      if (document.activeElement !== rnsUrlInput && rnsUrlInput.value !== state.rnsUrl.get()) rnsUrlInput.value = state.rnsUrl.get();
      if (document.activeElement !== rnsHashInput && rnsHashInput.value !== state.rnsDestHash.get()) rnsHashInput.value = state.rnsDestHash.get();
      if (document.activeElement !== rnsAspectInput && rnsAspectInput.value !== state.rnsAspect.get()) rnsAspectInput.value = state.rnsAspect.get();
      if (rnsIdentCb.checked !== state.rnsAutoIdentify.get()) rnsIdentCb.checked = state.rnsAutoIdentify.get();
      rnsUrlInput.disabled = connecting || connected || reconnecting;
      rnsHashInput.disabled = connecting || connected || reconnecting;
      rnsAspectInput.disabled = connecting || connected || reconnecting;
      rnsIdentCb.disabled = connecting || connected || reconnecting;
    }
    connectBtn.disabled = connecting || connected || reconnecting;
    connectBtn.textContent = connecting ? 'Connecting…' : 'Connect';
    // Disconnect is also the cancel-reconnect button while reconnecting.
    disconnectBtn.disabled = !connected && !reconnecting;
    if (autoCheckbox.checked !== state.autoReconnect.get()) autoCheckbox.checked = state.autoReconnect.get();
    let txt = 'Disconnected', cls = 'st-idle';
    if (reconnecting) { txt = 'Reconnecting…'; cls = 'st-connecting'; }
    else if (connecting) {
      // Show the transport-supplied phase label (e.g. "WS connecting",
      // "WS verifying", "Link connecting", "Finding path"…) plus the elapsed
      // time so the user has feedback during slow LoRa-paced steps.
      const label = (conn.info && String(conn.info).trim()) ? conn.info : 'Connecting';
      if (connectingStartedAt === null) connectingStartedAt = Date.now();
      if (elapsedTimer === null) elapsedTimer = setInterval(update, 1000);
      const elapsed = Math.floor((Date.now() - connectingStartedAt) / 1000);
      txt = label + '… ' + elapsed + 's';
      cls = 'st-connecting';
    }
    else if (connected) { txt = 'Connected' + (conn.info ? ` (${conn.info})` : ''); cls = 'st-ok'; }
    else if (conn.state === 'error') { txt = 'Error: ' + (conn.info || ''); cls = 'st-err'; }
    // Stop the elapsed-time ticker once we leave 'connecting'.
    if (!connecting && !reconnecting) {
      connectingStartedAt = null;
      if (elapsedTimer !== null) { clearInterval(elapsedTimer); elapsedTimer = null; }
    }
    pill.className = 'pill ' + cls;
    pill.textContent = txt;
  }
  update();
  state.conn.subscribe(update);
  state.transportName.subscribe(update);
  state.wsUrl.subscribe(update);
  state.rnsUrl.subscribe(update);
  state.rnsDestHash.subscribe(update);
  state.rnsAspect.subscribe(update);
  state.rnsAutoIdentify.subscribe(update);

  state.autoReconnect.subscribe(update);
  state.reconnecting.subscribe(update);
  return root;
}

// ----- Tab bar (in place) -----
function buildTabBar(){
  const root = el('div', { class: 'tabbar' });
  // Info merged into Node Status; that's now the always-available landing tab.
  const tabs = [
    { id: 'status', label: 'Node Status' },
    { id: 'nodeconfig', label: 'Node Config' },
    { id: 'config', label: 'Transport Config' },
    { id: 'logs', label: 'Logs' },
  ];
  const buttons = {};
  for (const t of tabs) {
    const b = el('button', { class: 'tab', onclick: () => state.activeTab.set(t.id) }, t.label);
    buttons[t.id] = b;
    root.appendChild(b);
  }
  // Transport Config is only meaningful when microReticulum is part of the
  // build — detected by the presence of any namespace with id < 100 (RNS
  // reserves 1-99 for built-in namespaces per RNode_Firmware.ino comments;
  // 100+ is for app namespaces like 'general' which exists even with HAS_RNS
  // undefined). Legacy firmware that doesn't speak Provisioning at all leaves
  // state.schema = null, in which case we also hide the tab.
  function transportConfigVisible(){
    const schema = state.schema.get();
    if (!schema || !Array.isArray(schema.namespaces)) return false;
    return schema.namespaces.some(n => Number(n.id) < 100);
  }
  function update(){
    const active = state.activeTab.get();
    // Treat "reconnecting" as not-yet-connected so per-tab actions don't fire
    // against a transport that's still being re-established.
    const connected = state.conn.get().state === 'connected' && !state.reconnecting.get();
    // Capability-gated visibility: every tab other than Node Status only
    // surfaces once we've positively confirmed the active transport supports
    // it. While disconnected (or reconnecting), only Node Status shows.
    //   - Node Config (legacy KISS opcodes): requires legacySupported === true
    //     (CMD_BOARD probe succeeded). Starts null and the probe takes up to
    //     1500ms, during which we keep the tab hidden — a brief delay is
    //     preferable to a flash-then-hide.
    //   - Transport Config (Provisioning + RNS namespaces): requires
    //     transportConfigVisible() (schema fetched and has an id<100 ns).
    //   - Logs (KISS CMD_LOG frames from the device): not delivered over RNS
    //     because RnsTransport only forwards CMD_PROVISION_RSP frames back.
    const isRns = state.transportName.get() === 'rns';
    const showNcfg = connected && state.legacySupported.get() === true;
    const showCfg  = connected && transportConfigVisible();
    const showLogs = connected && !isRns;
    for (const t of tabs) {
      const b = buttons[t.id];
      b.classList.toggle('active', active === t.id);
      b.disabled = !connected && t.id !== 'status';
      if (t.id === 'config')     b.style.display = showCfg  ? '' : 'none';
      if (t.id === 'nodeconfig') b.style.display = showNcfg ? '' : 'none';
      if (t.id === 'logs')       b.style.display = showLogs ? '' : 'none';
    }
    // Redirect away from any hidden tab so the user isn't on an invisible body.
    if (!showCfg  && active === 'config')     state.activeTab.set('status');
    if (!showNcfg && active === 'nodeconfig') state.activeTab.set('status');
    if (!showLogs && active === 'logs')       state.activeTab.set('status');
  }
  update();
  state.activeTab.subscribe(update);
  state.conn.subscribe(update);
  state.reconnecting.subscribe(update);
  state.schema.subscribe(update);
  state.legacySupported.subscribe(update);
  state.transportName.subscribe(update);
  return root;
}
slots.tabbar.appendChild(buildTabBar());

function buildStatusTab(){

    root.innerHTML = '';

    // visible on every tab. See buildRebootBanner() near the slot setup.)
    if (!connected) {

      ncDev && ncDev.platform != null ? row('Platform', `${PLATFORM_NAMES[ncDev.platform] || 'Unknown'} (0x${ncDev.platform.toString(16).padStart(2,'0')})`) : null,
      ncDev && ncDev.mcu      != null ? row('MCU',      `${MCU_NAMES[ncDev.mcu] || 'Unknown'} (0x${ncDev.mcu.toString(16).padStart(2,'0')})`) : null,
      info ? row('Needs reboot', info.needsReboot ? 'yes' : 'no') : null,
    ];
    const devSection = section('Device', devRows);
    if (devSection) root.appendChild(devSection);

    // ---- Live status sections (driven by CMD_STAT_*) ----
    const s = state.nodeStatus.get();
    const batStates = ['unknown','discharging','charging','charged'];
    const liveSections = [
      section('Radio link', [
        row('Last RSSI', s.lastRssi, 'dBm'),
        row('Last SNR', s.lastSnr != null ? s.lastSnr.toFixed(2) : null, 'dB'),
        row('Current RSSI', s.currentRssi, 'dBm'),
        row('Noise floor', s.noiseFloor, 'dBm'),
        row('Interference', s.interferenceRssi != null ? s.interferenceRssi + ' dBm' : null),
      ]),
      section('Channel', [
        row('Airtime (short)', s.airtimeShort != null ? (s.airtimeShort * 100).toFixed(2) : null, '%'),
        row('Airtime (long)', s.airtimeLong != null ? (s.airtimeLong * 100).toFixed(2) : null, '%'),
        row('Utilization (short)', s.channelUtilShort != null ? (s.channelUtilShort * 100).toFixed(2) : null, '%'),
        row('Utilization (long)', s.channelUtilLong != null ? (s.channelUtilLong * 100).toFixed(2) : null, '%'),
      ]),
      section('Counters', [row('RX packets', s.rxPackets), row('TX packets', s.txPackets)]),
      section('PHY parameters', [
        row('Symbol time', s.symbolTimeUs, 'µs'),
        row('Symbol rate', s.symbolRate, 'sym/s'),
        row('Preamble symbols', s.preambleSymbols),
        row('Preamble time', s.preambleTimeMs, 'ms'),
        row('CSMA slot', s.csmaSlotMs, 'ms'),
        row('DIFS', s.difsMs, 'ms'),
      ]),
      section('CSMA', [row('CW band', s.cwBand), row('CW min', s.cwMin), row('CW max', s.cwMax)]),
      section('Power', [
        row('Battery', s.batteryPercent != null ? `${s.batteryPercent}% (${batStates[s.batteryState || 0]})` : null),
        row('Temperature', s.temperatureC, '°C'),
      ]),
    ].filter(x => x != null);
    for (const sec of liveSections) root.appendChild(sec);

    if (!devSection && liveSections.length === 0) {
      root.appendChild(el('em', null, 'Waiting for status frames…'));
    }

    // ---- Danger zone (always at the bottom when connected) ----
    root.appendChild(el('h3', null, 'Danger zone'));
    root.appendChild(el('div', { style: { display: 'flex', gap: '8px' } }, [
      el('button', { onclick: reboot, disabled: !connected }, 'Reboot'),
      el('button', { onclick: factoryReset, disabled: !connected }, 'Factory reset'),
    ]));
  }
  update();
  bodyCleanups.push(state.nodeStatus.subscribe(update));
  bodyCleanups.push(state.info.subscribe(update));
  bodyCleanups.push(state.conn.subscribe(update));
  bodyCleanups.push(state.nodeCfgDeviceInfo.subscribe(update));
  bodyCleanups.push(state.nodeCfgNeedsReboot.subscribe(update));
  // Auto-fetch device info on first activation when connected so board/platform/MCU
  // appear without the user having to visit a separate sub-tab.
  if (state.conn.get().state === 'connected' && !state.nodeCfgDeviceInfo.get() && legacy) {
    legacy.readDeviceInfo().then(d => state.nodeCfgDeviceInfo.set(d)).catch(e => console.error('Node Status device info fetch:', e));
  }
  return root;
}

function formatFieldValueForInput(field, value){
  if (value == null) return '';
  if (field.type === FT.Bytes) {
    if (value instanceof Uint8Array) return Array.from(value).map(b => b.toString(16).padStart(2, '0')).join('');
    return '';
  }
  if (field.type === FT.BytesList) {
    if (!Array.isArray(value)) return '';
    return value.map(e => e instanceof Uint8Array
      ? Array.from(e).map(b => b.toString(16).padStart(2, '0')).join('')
      : '').join('\n');
  }
  return String(value);
}

// Parse a multi-line hex string into an array of Uint8Array. One entry per
// non-blank line; whitespace within a line is stripped (so users can paste
// hex with separators). Lines with odd length are rejected by returning null
// so the caller can hold off updating the draft until the user finishes typing.
function parseBytesListHex(text){
  if (text == null || text === '') return [];
  const out = [];
  const lines = String(text).split(/\r?\n/);
  for (const raw of lines) {
    const h = raw.replace(/[^0-9a-fA-F]/g, '');
    if (h.length === 0) continue;
    if (h.length % 2 !== 0) return null;  // not finished typing this line
    const u = new Uint8Array(h.length / 2);
    for (let i = 0; i < u.length; ++i) u[i] = parseInt(h.substr(i*2, 2), 16);
    out.push(u);
  }
  return out;
}

// Format a value for display in a read-only / info field. Returns { text, empty }.
// `empty` flags styling for "no value yet".
function renderReadOnlyValue(f, value){
  if (value == null) return { text: '—', empty: true };
  if (f.type === FT.Bool) return { text: value ? '✓ true' : '✗ false', empty: false };
  if (f.type === FT.Enum) {
    if (Array.isArray(f.enumValues)) {
      const idx = f.enumValues.findIndex(v => Number(v) === Number(value));
      if (idx >= 0 && Array.isArray(f.enumLabels) && f.enumLabels[idx]) {
        return { text: `${f.enumLabels[idx]} (${value})`, empty: false };
      }
    }
    return { text: String(value), empty: false };
  }
  if (f.type === FT.Bytes) {
    if (value instanceof Uint8Array) {
      if (value.length === 0) return { text: '(empty)', empty: true };
      return { text: Array.from(value).map(b => b.toString(16).padStart(2,'0')).join(''), empty: false };
    }
    return { text: '—', empty: true };
  }
  if (f.type === FT.BytesList) {
    if (Array.isArray(value)) {
      if (value.length === 0) return { text: '(empty list)', empty: true };
      return { text: value.map(e => e instanceof Uint8Array
        ? Array.from(e).map(b => b.toString(16).padStart(2,'0')).join('') : '').join('\n'), empty: false };
    }
    return { text: '—', empty: true };
  }
  if (f.unit) return { text: `${value} ${f.unit}`, empty: false };
  return { text: String(value), empty: false };
}

// Read-only info field: render a static value display (not a disabled input).
// Value comes from the server's getter via GET_STATE; we read from committed.
// Never participates in nsState.draft, never gates Save.
// Shared by all three field-row builders: skeleton row with label + badges
// container. Caller decides what trailing controls / value-display to add.
function _buildFieldHeader(f, rowClass){
  const row = el('div', { class: rowClass });
  const labelEl = el('label');
  labelEl.appendChild(el('span', null, f.label || f.name));
  const badges = el('span', { style: { display: 'inline-flex', gap: '4px' } });
  labelEl.appendChild(badges);
  row.appendChild(labelEl);
  return { row, labelEl, badges };
}

// Construct the input element for a field's declared type. Returns the input
// plus a readValue() that extracts the current typed value. Hex / BytesList
// readValue may return `{__error: 'reason'}` when the user is mid-edit and the
// content isn't a valid byte sequence — callers decide whether to surface the
// error (write-only on Send) or silently wait (regular field while typing).
//
// `opts.secret` makes string inputs render as <input type="password">.
// `opts.bigBytesList` switches the BytesList textarea to the larger 5-row
// layout used by the regular draft store (vs. the 3-row layout used by the
// one-shot write-only form).
function _buildFieldInput(f, opts){
  opts = opts || {};
  const secret = !!opts.secret;
  const bigBytesList = !!opts.bigBytesList;
  let input;
  let readValue;
  if (f.type === FT.Bool) {
    input = el('input', { type: 'checkbox' });
    readValue = () => input.checked;
  } else if (f.type === FT.Int) {
    input = el('input', { type: 'number', step: '1',
      min: f.minI != null ? Number(f.minI) : undefined,
      max: f.maxI != null ? Number(f.maxI) : undefined });
    readValue = () => input.value === '' ? null : parseInt(input.value, 10);
  } else if (f.type === FT.Float) {
    input = el('input', { type: 'number', step: 'any',
      min: f.minF != null ? Number(f.minF) : undefined,
      max: f.maxF != null ? Number(f.maxF) : undefined });
    readValue = () => input.value === '' ? null : parseFloat(input.value);
  } else if (f.type === FT.String) {
    const big = f.maxLen && Number(f.maxLen) > 80;
    input = big
      ? el('textarea', { rows: '3', maxlength: Number(f.maxLen) })
      : el('input', { type: secret ? 'password' : 'text', maxlength: f.maxLen ? Number(f.maxLen) : undefined });
    readValue = () => input.value;
  } else if (f.type === FT.Enum) {
    input = el('select');
    if (Array.isArray(f.enumValues)) {
      const labels = Array.isArray(f.enumLabels) ? f.enumLabels : null;
      for (let i = 0; i < f.enumValues.length; ++i) {
        const ev = Number(f.enumValues[i]);
        input.appendChild(el('option', { value: String(ev) }, labels && labels[i] ? labels[i] : String(ev)));
      }
    }
    readValue = () => input.value === '' ? null : parseInt(input.value, 10);
  } else if (f.type === FT.Bytes) {
    input = el('input', { type: 'text', placeholder: f.maxLen ? `hex (max ${f.maxLen} bytes)` : 'hex' });
    readValue = () => {
      const t = String(input.value || '').replace(/[^0-9a-fA-F]/g, '');
      if (t.length % 2 !== 0) return { __error: 'odd hex' };
      const u8 = new Uint8Array(t.length / 2);
      for (let i = 0; i < u8.length; ++i) u8[i] = parseInt(t.substr(i*2, 2), 16);
      return u8;
    };
  } else if (f.type === FT.BytesList) {
    // One hex entry per line. elementSize fixes per-entry length; maxCount
    // limits total entries. Both are zero/null when unconstrained.
    const sz = f.elementSize != null ? Number(f.elementSize) : 0;
    const max = f.maxCount != null ? Number(f.maxCount) : 0;
    const hints = [];
    if (sz > 0) hints.push(bigBytesList ? `${sz} bytes / ${sz*2} hex chars per entry` : `${sz} bytes per entry`);
    if (max > 0) hints.push(`up to ${max} entries`);
    hints.push('one per line');
    const style = bigBytesList
      ? { fontFamily: 'ui-monospace, Menlo, monospace', minWidth: '360px' }
      : { fontFamily: 'ui-monospace, Menlo, monospace' };
    input = el('textarea', { rows: bigBytesList ? '5' : '3', placeholder: 'hex (' + hints.join(', ') + ')', style });
    readValue = () => {
      const list = parseBytesListHex(input.value);
      // null = an in-progress odd-length line. Callers in the regular draft
      // path treat this as "wait" (silent no-op); the WO path surfaces it on
      // Send so the user knows why nothing happened.
      if (list == null) return { __error: 'odd hex on one of the lines' };
      return list;
    };
  } else if (f.type === FT.Void) {
    // Argument-less command — the Send button is the entire control surface.
    input = null;
    readValue = () => null;
  } else {
    input = el('span', null, '(unknown type)');
    readValue = () => null;
  }
  return { input, readValue };
}

function buildFieldRowReadOnly(nsId, f, c){
  const { row, badges } = _buildFieldHeader(f, 'field ro-info');
  const valueEl = el('div', { class: 'ro-value' });
  row.appendChild(valueEl);
  const secret = !!(f.flags & FF.SECRET);
  const reboot = !!(f.flags & FF.REBOOT_REQUIRED);
  function update(){
    const nsObj = c.state.get()[nsId] || { committed: {}, draft: {} };
    // FF_SECRET fields aren't returned in GET_STATE, so committed will be empty.
    const value = (f.id in nsObj.committed) ? nsObj.committed[f.id] : null;
    const rendered = secret && value == null
      ? { text: '(secret — not exposed)', empty: true }
      : renderReadOnlyValue(f, value);
    valueEl.textContent = rendered.text;
    valueEl.classList.toggle('empty', rendered.empty);
    badges.innerHTML = '';
    badges.appendChild(el('span', { class: 'badge ro' }, 'read-only'));
    if (secret) badges.appendChild(el('span', { class: 'badge secret' }, 'secret'));
    if (reboot) badges.appendChild(el('span', { class: 'badge reboot' }, '↻ reboot'));
  }
  update();
  return { row, update, fieldId: f.id, hasDraftError: () => false };
}

// Write-only command field: input + Send button. Send fires SetState+Commit
// for this single field. Value isn't stored in nsState.draft and the field
// doesn't gate Save / Revert / Commit-all.
function buildFieldRowWriteOnly(nsId, f, c){
  const { row, badges } = _buildFieldHeader(f, 'field wo-action');
  const controls = el('div', { class: 'wo-controls' });
  const errEl = el('div', { class: 'err' });
  row.appendChild(controls);
  row.appendChild(errEl);

  const secret = !!(f.flags & FF.SECRET);
  const reboot = !!(f.flags & FF.REBOOT_REQUIRED);

  // WO fields have no draft store — the live input value is read directly
  // on Send. _buildFieldInput's readValue() returns {__error} for unparseable
  // hex/bytes-list content, which we surface in errEl below.
  const { input, readValue } = _buildFieldInput(f, { secret, bigBytesList: false });
  if (input) controls.appendChild(input);   // FT.Void has no input element.

  const sendBtn = el('button', { class: 'wo-send' }, 'Send');
  controls.appendChild(sendBtn);

  sendBtn.onclick = async () => {
    if (!client) { showToast('Not connected', 'err'); return; }
    const v = readValue();
    if (v && typeof v === 'object' && '__error' in v) {
      errEl.textContent = v.__error; row.classList.add('has-err'); return;
    }
    const verr = validateValue(f, v);
    if (verr) { errEl.textContent = verr; row.classList.add('has-err'); return; }
    errEl.textContent = ''; row.classList.remove('has-err');
    sendBtn.disabled = true;
    const prevLbl = sendBtn.textContent || 'Send';
    sendBtn.textContent = 'Sending…';
    try {
      // SetState puts the value in the firmware's per-field draft (write-only
      // accepts drafts but doesn't persist). Commit fires the setter once.
      const res = await client.setState({ [nsId]: { [f.id]: { type: f.type, value: v } } });
      if (res.fieldErrors && res.fieldErrors.length > 0) {
        const fe = res.fieldErrors.find(e => e.ns === nsId && e.field === f.id) || res.fieldErrors[0];
        errEl.textContent = 'server: ' + fe.codeName;
        row.classList.add('has-err');
        showToast(`Send rejected: ${fe.codeName}`, 'err');
        return;
      }
      await client.commit([nsId]);
      showToast(`Sent ${f.label || f.name}`, 'ok');
    } catch (e) {
      errEl.textContent = e.message || String(e);
      row.classList.add('has-err');
      showToast(`Send failed: ${e.message || e}`, 'err');
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = prevLbl;
    }
  };

  function update(){
    badges.innerHTML = '';
    badges.appendChild(el('span', { class: 'badge wo' }, 'command'));
    if (secret) badges.appendChild(el('span', { class: 'badge secret' }, 'secret'));
    if (reboot) badges.appendChild(el('span', { class: 'badge reboot' }, '↻ reboot'));
  }
  update();
  return { row, update, fieldId: f.id, hasDraftError: () => false };
}

function buildFieldRow(nsId, f, ctx){
  const c = _ctxOr(ctx);
  // FF_WRITE_ONLY and FF_READ_ONLY are routed to specialised renderers — they
  // don't participate in the namespace draft store and they don't gate Save.
  const wo = !!(f.flags & FF.WRITE_ONLY);
  const ro = !!(f.flags & FF.READ_ONLY) && !wo;
  if (ro) return buildFieldRowReadOnly(nsId, f, c);
  if (wo) return buildFieldRowWriteOnly(nsId, f, c);
  const { row, badges } = _buildFieldHeader(f, 'field');
  const inputHost = el('div');
  const errEl = el('div', { class: 'err' });
  row.appendChild(inputHost);
  row.appendChild(errEl);

  // FF_READ_ONLY already routed to buildFieldRowReadOnly above (and FF_WRITE_ONLY
  // to buildFieldRowWriteOnly), so we never need to disable inputs here.
  const secret = !!(f.flags & FF.SECRET);
  const reboot = !!(f.flags & FF.REBOOT_REQUIRED);
  // Legacy Node Config fields with no KISS read counterpart. The displayed
  // value is a schema placeholder, not a readback — surface this with a badge
  // so the user doesn't mistake the placeholder for the device's current state.
  const setOnly = (f.readable === false);

  // Build input ONCE; we never recreate it on subsequent state changes. Use
  // the regular-draft variant (bigBytesList=true) so BytesList textareas get
  // the larger 5-row / 360px-min layout intended for sustained editing.
  const { input, readValue } = _buildFieldInput(f, { secret, bigBytesList: true });

  // Wire the right event to setDraftValue. Most types use 'input' (continuous);
  // <select> only fires 'change'. Hex/BytesList readValue returns {__error}
  // mid-edit; we silently skip those so a half-typed value doesn't clobber
  // the draft (the regular flow waits for the user to finish typing).
  const evtName = (f.type === FT.Enum) ? 'change' : 'input';
  input.addEventListener(evtName, () => {
    const v = readValue();
    if (v && typeof v === 'object' && '__error' in v) return;
    setDraftValue(nsId, f, v, c);
  });
  // Optional unit suffix (e.g. "Hz", "dBm") rendered next to the input.
  if (f.unit) {
    inputHost.style.display = 'flex';
    inputHost.style.alignItems = 'center';
    inputHost.style.gap = '6px';
    inputHost.appendChild(input);
    inputHost.appendChild(el('span', { class: 'unit', style: { color: 'var(--muted)' } }, f.unit));
  } else {
    inputHost.appendChild(input);
  }

  function update(){
    const nsObj = c.state.get()[nsId] || { committed: {}, draft: {} };
    const value = getEffectiveValue(nsId, f, c);
    const isDraft = f.id in nsObj.draft;
    // Sync input value ONLY if it's not currently focused — preserves cursor/selection while typing.
    if (document.activeElement !== input) {
      if (f.type === FT.Bool) {
        input.checked = !!value;
      } else if (f.type === FT.Enum) {
        const want = String(Number(value));
        if (input.value !== want) input.value = want;
      } else {
        const fmt = formatFieldValueForInput(f, value);
        if (input.value !== fmt) input.value = fmt;
      }
    }
    // Badges
    badges.innerHTML = '';
    if (ro) badges.appendChild(el('span', { class: 'badge ro' }, 'read-only'));
    if (secret) badges.appendChild(el('span', { class: 'badge secret' }, 'secret'));
    if (reboot) badges.appendChild(el('span', { class: 'badge reboot' }, '↻ reboot'));
    if (setOnly) badges.appendChild(el('span', {
      class: 'badge set-only',
      title: 'Write-only on this device. The value shown is a schema placeholder; editing and Save writes the value to the device, but the firmware does not expose a read opcode for this field.'
    }, 'set-only'));
    if (isDraft) badges.appendChild(el('span', { class: 'badge draft' }, '• draft'));
    // Errors — only surface validation errors for fields the user actually edited.
    // Untouched fields may carry firmware "sentinel" defaults (e.g. radio.frequency=0)
    // that fall outside the advertised min/max range; the firmware ignores them as
    // "unconfigured", so we should not flag them as user-facing errors.
    const serverErr = c.errors && (c.errors.get()[nsId] || {})[f.id];
    const valErr = (isDraft && validateValue(f, value)) || null;
    const msg = serverErr ? 'server: ' + serverErr : valErr;
    errEl.textContent = msg || '';
    row.classList.toggle('has-err', !!msg);
  }
  return {
    row,
    update,
    fieldId: f.id,
    // hasDraftError: only count validation errors for drafted fields toward
    // the Save-button gate, for the same reason as the display above.
    hasDraftError: () => {
      const draft = (c.state.get()[nsId] || {}).draft || {};
      if (!(f.id in draft)) return false;
      return !!validateValue(f, getEffectiveValue(nsId, f, c));
    },
  };
}

function buildNamespacePanel(nsId){
  // Renders a root namespace AND any descendant namespaces as nested
  // sub-sections inside the same panel. One toolbar at the top operates on
  // the whole tree (Save / Revert / Refresh). Field rows from every namespace
  // in the tree feed into the same hasDraftError / Save-enable computation.
  const wrap = el('div');
  const schema = state.schema.get();
  const rootNs = schema && getNsById(schema, nsId);
  if (!rootNs) { wrap.appendChild(el('em', null, 'Unknown namespace')); return { node: wrap, cleanups: [] }; }
  const treeIds = getNsTreeIds(schema, nsId);

  // Header + toolbar
  const header = el('h2', { class: 'ns-h' }, rootNs.name);
  wrap.appendChild(header);
  const toolbar = el('div', { class: 'ns-toolbar' });
  const saveBtn = el('button', null, 'Save namespace');
  const revertBtn = el('button', null, 'Revert');
  const refreshBtn = el('button', null, 'Refresh');
  saveBtn.onclick = () => saveNamespace(nsId);
  revertBtn.onclick = () => revertNamespace(nsId);
  refreshBtn.onclick = () => refreshNamespace(nsId);
  toolbar.appendChild(saveBtn);
  toolbar.appendChild(revertBtn);
  toolbar.appendChild(refreshBtn);
  wrap.appendChild(toolbar);

  // Build one section per namespace in the tree. The root namespace's fields
  // come first, then each descendant in depth-first order. Each descendant
  // gets a sub-section heading (h3) so the user sees the hierarchy.
  const fieldHandles = [];
  // Depth of a namespace relative to the panel's root. Depth 0 = the root
  // itself (rendered as the h2 at the top), depth 1 = direct child rendered as
  // "section" (h3), depth 2 = grandchild rendered as "sub-section" (h4), and
  // depth 3+ keeps stepping down to h5 with progressive indentation.
  function depthOf(id){
    if (Number(id) === Number(nsId)) return 0;
    let cur = getNsById(schema, id);
    let d = 0;
    while (cur && Number(cur.id) !== Number(nsId)) {
      d++;
      if (!cur.parentId) return -1;     // not actually a descendant of nsId
      cur = getNsById(schema, cur.parentId);
      if (d > 32) break;                 // cycle / pathological depth guard
    }
    return cur ? d : -1;
  }
  // Pixels of left-indent per depth level. Matched between heading and the
  // fields container so a sub-section's fields line up under its heading.
  const INDENT_PX = 16;
  for (const id of treeIds) {
    const ns = getNsById(schema, id);
    if (!ns) continue;
    const depth = depthOf(id);
    if (id !== nsId) {
      // Heading tag scales with depth so the visual hierarchy reads naturally:
      // h3 for top-level sections under the root, h4 for sub-sections,
      // h5 for deeper nesting (which is rare but supported).
      const tag = depth === 1 ? 'h3' : (depth === 2 ? 'h4' : 'h5');
      const cls = `ns-sub depth-${Math.min(depth, 3)}`;
      const indent = (depth - 1) * INDENT_PX;
      wrap.appendChild(el(tag, { class: cls, style: { marginLeft: indent + 'px' } }, ns.name));
    }
    const indent = depth > 0 ? ((depth - 1) * INDENT_PX) + 'px' : '0';
    const hasOwnFields = ns.fields && ns.fields.length > 0;
    if (!hasOwnFields) {
      // Suppress the "(no fields)" placeholder when this namespace is a
      // container for child namespaces — they render in subsequent iterations
      // of this same treeIds loop.
      const hasChildren = getChildrenOf(schema, id).length > 0;
      if (!hasChildren) {
        wrap.appendChild(el('div', { class: 'ns-empty',
          style: { color: 'var(--muted)', fontStyle: 'italic', marginLeft: indent } },
          '(no fields)'));
      }
      continue;
    }
    const section = el('div', { class: 'ns-sub-fields', style: { marginLeft: indent } });
    for (const f of ns.fields) {
      const h = buildFieldRow(id, f);
      section.appendChild(h.row);
      fieldHandles.push(h);
    }
    wrap.appendChild(section);
  }

  function updateButtons(){
    const hasDraft = nsTreeDraftCount(schema, nsId) > 0;
    const anyErr = fieldHandles.some(h => h.hasDraftError());
    saveBtn.disabled = !hasDraft || anyErr;
    saveBtn.classList.toggle('primary', hasDraft && !anyErr);
    revertBtn.disabled = !hasDraft;
  }
  function updateAll(){
    for (const h of fieldHandles) h.update();
    updateButtons();
  }
  updateAll();

  const cleanups = [
    state.nsState.subscribe(updateAll),
    state.nsServerErrors.subscribe(updateAll),
  ];
  return { node: wrap, cleanups };
}

function buildConfigTab(){
  const root = el('div', { class: 'tab-body config-tab no-pad' });
  const sidenav = el('div', { class: 'sidenav' });
  const detail = el('div', { class: 'sidenav-detail' });
  root.appendChild(sidenav);
  root.appendChild(detail);

  // Cleanup for the inner-mounted namespace panel
  let nsCleanups = [];
  // After this many ms in the "Loading…" state, show a "timed out + Refresh"
  // view. Matches the RNS request timeout so on a stalled connection the
  // UI surfaces a retry control instead of an indefinite spinner.
  const LOAD_TIMEOUT_MS = 30000;
  function mountNs(nsId){
    for (const fn of nsCleanups) { try { fn(); } catch(_) {} }
    nsCleanups = [];
    detail.innerHTML = '';
    if (nsId == null) { detail.appendChild(el('em', null, 'Select a namespace from the left.')); return; }
    // Treat the panel as "loaded" only when EVERY namespace in the tree has
    // been fetched — otherwise show "Loading…" so partial sub-sections don't
    // render with empty default values.
    const schema = state.schema.get();
    const treeIds = schema ? getNsTreeIds(schema, nsId) : [Number(nsId)];
    const loaded = state.nsLoaded.get();
    const allLoaded = treeIds.length > 0 && treeIds.every(id => !!loaded[id]);
    if (!allLoaded) {
      detail.appendChild(el('em', null, 'Loading…'));
      const timerId = setTimeout(() => {
        // Only swap to the timeout view if we're still in the loading state —
        // a successful fetch in the meantime will have re-entered mountNs and
        // cleared this timer via nsCleanups.
        const cur = state.nsLoaded.get();
        const stillLoading = !(treeIds.length > 0 && treeIds.every(id => !!cur[id]));
        if (!stillLoading) return;
        detail.innerHTML = '';
        detail.appendChild(el('div', { class: 'notice' }, 'Loading timed out.'));
        const retry = el('button', { class: 'primary', onclick: () => refreshNamespace(nsId) }, 'Refresh');
        detail.appendChild(retry);
      }, LOAD_TIMEOUT_MS);
      nsCleanups.push(() => clearTimeout(timerId));
      fetchNamespaceIfNeeded(nsId);
      return;
    }
    const { node, cleanups } = buildNamespacePanel(nsId);
    nsCleanups = cleanups;
    detail.appendChild(node);
  }

  const navButtons = new Map(); // rootNsId -> { btn, dot }
  function rebuildSidenav(){
    sidenav.innerHTML = '';
    navButtons.clear();
    const schema = state.schema.get();
    if (!schema) { sidenav.appendChild(el('em', { style: { padding: '8px 16px', color: 'var(--muted)' } }, 'No schema')); return; }
    // Only root namespaces (parentId == 0) get top-level sidenav entries.
    // Children render as sub-sections inside their root's panel.
    const roots = schema.namespaces.filter(n => !Number(n.parentId || 0));
    const activeNs = state.activeNsTab.get();
    for (const ns of roots) {
      const b = el('button', { class: 'sidenav-btn' + (ns.id === activeNs ? ' active' : ''), onclick: () => state.activeNsTab.set(ns.id) });
      const lbl = el('span', null, ns.name);
      const dot = el('span', { class: 'dot', style: { display: nsTreeDraftCount(schema, ns.id) > 0 ? '' : 'none' } });
      b.appendChild(lbl);
      b.appendChild(dot);
      sidenav.appendChild(b);
      navButtons.set(ns.id, { btn: b, dot });
    }
  }
  function updateNavActive(){
    const active = state.activeNsTab.get();
    for (const [nsId, { btn }] of navButtons) {
      btn.classList.toggle('active', nsId === active);
    }
  }
  function updateNavDots(){
    const schema = state.schema.get();
    for (const [nsId, { dot }] of navButtons) {
      dot.style.display = nsTreeDraftCount(schema, nsId) > 0 ? '' : 'none';
    }
  }

  // Pick a root namespace as the default selection (skip non-root children).
  rebuildSidenav();
  const sch = state.schema.get();
  if (sch && state.activeNsTab.get() == null) {
    const firstRoot = sch.namespaces.find(n => !Number(n.parentId || 0)) || sch.namespaces[0];
    if (firstRoot) state.activeNsTab.set(firstRoot.id);
  } else if (sch && state.activeNsTab.get() != null) {
    // If the previously-selected ns is a child (e.g. saved from a v1 schema
    // session), redirect to its root so the panel renders correctly.
    const cur = getNsById(sch, state.activeNsTab.get());
    if (cur && Number(cur.parentId || 0) !== 0) {
      let root = cur;
      while (root && root.parentId) root = getNsById(sch, root.parentId);
      if (root) state.activeNsTab.set(root.id);
    }
  }
  mountNs(state.activeNsTab.get());

  bodyCleanups.push(state.schema.subscribe(() => { rebuildSidenav(); mountNs(state.activeNsTab.get()); }));
  bodyCleanups.push(state.activeNsTab.subscribe((nsId) => { updateNavActive(); mountNs(nsId); }));
  bodyCleanups.push(state.nsLoaded.subscribe(() => {
    // Remount on every nsLoaded change so transitions in both directions are
    // visible: loaded → invalidated (Refresh / Save / Commit) shows the
    // "Loading…" placeholder again with a fresh 30s timeout, and
    // invalidated → loaded swaps back to the populated panel.
    const cur = state.activeNsTab.get();
    if (cur != null) mountNs(cur);
  }));
  bodyCleanups.push(state.nsState.subscribe(updateNavDots));
  bodyCleanups.push(() => { for (const fn of nsCleanups) try { fn(); } catch(_) {} });
  return root;
}

// ===== Node Config tab =====
// Master/detail with a statically-defined sidenav (sections from
// NODE_CONFIG_SCHEMA). Each section is either standard schema-driven (Radio,
// WiFi, Display) or custom (Device Info, Mode, Bluetooth, EEPROM).

function ncfgDraftCount(sectionId){
  const s = state.nodeCfgState.get()[sectionId];
  return s ? Object.keys(s.draft || {}).length : 0;
}

async function ncfgFetchSection(sectionId){
  if (!legacy) return;
  if (state.nodeCfgLoaded.get()[sectionId] || state.nodeCfgLoading.get()[sectionId]) return;
  state.nodeCfgLoading.update(s => { s[sectionId] = true; });
  try {
    const sec = NODE_CONFIG_SCHEMA[sectionId];
    // Section may declare a custom `readFn` for cases where the per-field
    // legacy queries aren't enough (e.g. WiFi config, whose CMD_WIFI_*
    // opcodes are write-only — the values live in EEPROM and have to be
    // read back via CMD_ROM_READ / CMD_CFG_READ and decoded).
    const committed = sec && typeof sec.readFn === 'function'
      ? await sec.readFn(legacy)
      : await legacy.readSection(sectionId);
    state.nodeCfgState.update(s => { s[sectionId] = { committed, draft: {} }; });
    state.nodeCfgLoaded.update(s => { s[sectionId] = true; });
  } catch (e) {
    console.error('Node Config read failed:', e);
    showToast('Failed to read ' + sectionId + ': ' + e.message, 'err');
  } finally {
    state.nodeCfgLoading.update(s => { delete s[sectionId]; });
  }
}

async function ncfgSaveSection(sectionId){
  if (!legacy) return;
  const sec = NODE_CONFIG_SCHEMA[sectionId];
  if (!sec) return;
  const obj = state.nodeCfgState.get()[sectionId];
  if (!obj || Object.keys(obj.draft).length === 0) return;
  try {
    await legacy.writeSection(sectionId, obj.draft);
    // Treat the draft as the new committed state. (We don't re-read because many
    // legacy CMDs are write-only — no read counterpart on the firmware side.)
    state.nodeCfgState.update(s => {
      const committed = { ...obj.committed, ...obj.draft };
      s[sectionId] = { committed, draft: {} };
    });
    recomputeHasDraft(NCFG_CTX);
    const label = sec.label || sectionId;
    showToast(`Saved ${label} settings`, 'ok');
    // If any saveTrailer op was CMD_CONF_SAVE, the radio config was persisted —
    // remind the user that the next boot enters TNC mode.
    const trailerOps = sec.saveTrailer
      ? (Array.isArray(sec.saveTrailer) ? sec.saveTrailer : [sec.saveTrailer])
      : [];
    if (trailerOps.some(op => op.cmd === CMD_CONF_SAVE)) {
      showToast('Radio config persisted to EEPROM (device will boot in TNC mode)', 'warn');
    }
    // Hint the user to reboot when the saved section's changes take effect at
    // boot time (radio, wifi). Reflected in the Node Status reboot banner.
    if (sec.requiresReboot) state.nodeCfgNeedsReboot.set(true);
  } catch (e) {
    showToast('Save failed: ' + e.message, 'err');
  }
}

function ncfgRevertSection(sectionId){
  state.nodeCfgState.update(s => {
    if (s[sectionId]) s[sectionId].draft = {};
  });
  recomputeHasDraft(NCFG_CTX);
}

function buildNcfgSchemaPanel(sectionId){
  const sec = NODE_CONFIG_SCHEMA[sectionId];
  const wrap = el('div', { class: 'ncfg-section' });
  wrap.appendChild(el('h2', null, sec.label));

  // A section is fully "set-only" when every field is declared readable:false
  // and there's no readFn to surface a value some other way. Refresh is
  // meaningless in that case, and the displayed values are placeholders.
  const setOnlySection = Array.isArray(sec.fields) && sec.fields.length > 0
    && typeof sec.readFn !== 'function'
    && sec.fields.every(f => f.readable === false);

  const toolbar = el('div', { class: 'ns-toolbar' });
  const saveBtn = el('button', null, 'Save ' + sec.label);
  const revertBtn = el('button', null, 'Revert');
  const refreshBtn = el('button', null, 'Refresh');
  saveBtn.onclick = () => ncfgSaveSection(sectionId);
  revertBtn.onclick = () => ncfgRevertSection(sectionId);
  refreshBtn.onclick = () => {
    state.nodeCfgLoaded.update(s => { delete s[sectionId]; });
    ncfgFetchSection(sectionId);
  };
  toolbar.appendChild(saveBtn);
  // Revert and Refresh are meaningless for fully set-only sections (nothing
  // on the device to revert against or refresh from), so hide them entirely.
  if (!setOnlySection) {
    toolbar.appendChild(revertBtn);
    toolbar.appendChild(refreshBtn);
  }
  wrap.appendChild(toolbar);

  if (setOnlySection) {
    wrap.appendChild(el('div', { class: 'set-only-banner' },
      'This section is write-only. The device firmware does not expose these fields for readback over KISS, so the values shown below are schema placeholders, not the current device state. Edits take effect when you click Save.'));
  }

  if (sec.saveTrailerNote) {
    wrap.appendChild(el('div', { class: 'ncfg-trailer' }, sec.saveTrailerNote));
  }

  const fieldHandles = [];
  for (const f of sec.fields) {
    const h = buildFieldRow(sectionId, f, NCFG_CTX);
    wrap.appendChild(h.row);
    fieldHandles.push(h);
  }

  function updateButtons(){
    const hasDraft = ncfgDraftCount(sectionId) > 0;
    const anyErr = fieldHandles.some(h => h.hasDraftError());
    saveBtn.disabled = !hasDraft || anyErr;
    saveBtn.classList.toggle('primary', hasDraft && !anyErr);
    revertBtn.disabled = !hasDraft;
  }
  function updateAll(){
    for (const h of fieldHandles) h.update();
    updateButtons();
  }
  updateAll();
  const cleanups = [
    state.nodeCfgState.subscribe(updateAll),
  ];
  return { node: wrap, cleanups };
}

function buildNcfgDeviceInfoPanel(){
  const wrap = el('div', { class: 'ncfg-section' });
  wrap.appendChild(el('h2', null, 'Device Info'));
  const refreshBtn = el('button', null, 'Refresh');
  refreshBtn.onclick = async () => {
    if (!legacy) return;
    refreshBtn.disabled = true;
    refreshBtn.textContent = 'Reading…';
    try {
      const info = await legacy.readDeviceInfo();
      state.nodeCfgDeviceInfo.set(info);
    } catch (e) {
      showToast('Device info read failed: ' + e.message, 'err');
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.textContent = 'Refresh';
    }
  };
  const toolbar = el('div', { class: 'ns-toolbar' }, [refreshBtn]);
  wrap.appendChild(toolbar);

  const table = el('table', { class: 'kv-info' });
  wrap.appendChild(table);

  function hexOf(u8){
    if (!u8) return '';
    return Array.from(u8).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  function row(label, val, cls){
    const td = el('td', cls ? { class: cls } : null, val == null ? '—' : val);
    return el('tr', null, [el('td', null, label), td]);
  }
  function update(){
    table.innerHTML = '';
    const info = state.nodeCfgDeviceInfo.get();
    if (!info) {
      table.appendChild(el('tr', null, [el('td', null, ''), el('td', null,
        el('em', null, 'Click Refresh to read device information.'))]));
      return;
    }
    const boardLbl = info.board != null ? `${BOARD_NAMES[info.board] || 'Unknown'} (0x${info.board.toString(16).padStart(2,'0')})` : null;
    const platLbl = info.platform != null ? `${PLATFORM_NAMES[info.platform] || 'Unknown'} (0x${info.platform.toString(16).padStart(2,'0')})` : null;
    const mcuLbl = info.mcu != null ? `${MCU_NAMES[info.mcu] || 'Unknown'} (0x${info.mcu.toString(16).padStart(2,'0')})` : null;
    table.appendChild(row('Board', boardLbl));
    table.appendChild(row('Platform', platLbl));
    table.appendChild(row('MCU', mcuLbl));
    table.appendChild(row('Firmware version', info.fwVersion));
    if (info.devHash) table.appendChild(row('Device hash', hexOf(info.devHash), 'hash'));
    if (info.fwHashTarget) table.appendChild(row('FW hash (target)', hexOf(info.fwHashTarget), 'hash'));
    if (info.fwHashActual) table.appendChild(row('FW hash (actual)', hexOf(info.fwHashActual), 'hash'));
    if (info.bootloaderHash) table.appendChild(row('Bootloader hash', hexOf(info.bootloaderHash), 'hash'));
    if (info.partitionHash) table.appendChild(row('Partition hash', hexOf(info.partitionHash), 'hash'));
  }
  update();
  const cleanups = [ state.nodeCfgDeviceInfo.subscribe(update) ];
  return { node: wrap, cleanups };
}

function buildNcfgRadioPanel(){
  // Combined Mode + Radio panel. Mode (HOST/TNC) selector sits above the
  // radio fields. Radio config only persists for TNC mode (the HOST flow
  // re-issues radio params on every boot via individual KISS opcodes, so the
  // EEPROM-stored values are unused). Field rows are disabled when HOST is
  // selected — but kept rendered so the user sees what would be persisted.
  const sec = NODE_CONFIG_SCHEMA.radio;
  const wrap = el('div', { class: 'ncfg-section' });
  wrap.appendChild(el('h2', null, 'Radio'));

  // Persisted mode (from EEPROM byte 0xA7). Source of truth for the Mode
  // selector's initial state. Null until EEPROM has been read.
  const persistedMode = () => {
    const ee = state.nodeCfgEeprom.get();
    if (!ee || ee.length <= 0xA7) return null;
    return ee[0xA7] === CONF_OK_BYTE ? 'tnc' : 'host';
  };
  let targetMode = persistedMode() || 'host';   // what the user has selected

  // --- Mode selector ---
  const modeRow = el('div', { class: 'mode-current', style: { display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap' } });
  const modeLabel = el('span');
  const modeSelect = el('select');
  modeSelect.appendChild(el('option', { value: 'host' }, 'HOST (KISS radio modem)'));
  modeSelect.appendChild(el('option', { value: 'tnc' },  'TNC (boot into embedded RNS)'));
  modeRow.appendChild(el('strong', null, 'Boot mode: '));
  modeRow.appendChild(modeSelect);
  modeRow.appendChild(modeLabel);
  wrap.appendChild(modeRow);

  wrap.appendChild(el('p', { style: { color: 'var(--muted)', margin: '8px 0 14px' } }, [
    'In ', el('strong', null, 'HOST'), ' mode the device acts as a KISS radio modem driven by this connection — radio settings are sent from the host at runtime and the EEPROM-stored values below are unused. In ',
    el('strong', null, 'TNC'), ' mode the device boots its embedded Reticulum stack and uses the radio config persisted below; the serial port carries RNS log output and the device stops responding to legacy KISS commands.'
  ]));

  // --- Toolbar ---
  const toolbar = el('div', { class: 'ns-toolbar' });
  const saveBtn = el('button', null, 'Save Radio');
  const revertBtn = el('button', null, 'Revert');
  const refreshBtn = el('button', null, 'Refresh');
  toolbar.appendChild(saveBtn);
  toolbar.appendChild(revertBtn);
  toolbar.appendChild(refreshBtn);
  wrap.appendChild(toolbar);

  // --- Field rows (reused via buildFieldRow) ---
  const fieldHandles = [];
  const fieldRows = el('div');
  for (const f of sec.fields) {
    const h = buildFieldRow('radio', f, NCFG_CTX);
    fieldHandles.push(h);
    fieldRows.appendChild(h.row);
  }
  wrap.appendChild(fieldRows);

  // Find each input element so we can enable/disable based on target mode.
  // Uses querySelectorAll on the row — earlier code walked a `_children`
  // property that only exists on the self-test mock-DOM, so on real DOM the
  // loop silently no-op'd and the disable never took effect.
  function setRadioFieldsEnabled(enabled){
    for (const h of fieldHandles) {
      const inputs = h.row.querySelectorAll('input, select, textarea');
      for (const inp of inputs) inp.disabled = !enabled;
    }
    fieldRows.style.opacity = enabled ? '' : '0.55';
  }

  // --- Auto-read EEPROM so we know the persisted mode ---
  if (!state.nodeCfgEeprom.get() && legacy) {
    legacy.readEeprom().then(u => state.nodeCfgEeprom.set(u)).catch(e => {
      console.error('Radio panel EEPROM read failed:', e);
    });
  }
  // --- Auto-fetch radio field values (custom panels skip the default
  //     auto-fetch in mountSection) ---
  if (!state.nodeCfgLoaded.get()['radio']) ncfgFetchSection('radio');

  // --- React to changes ---
  function syncFromState(){
    const pm = persistedMode();
    modeLabel.textContent = pm == null ? '(reading EEPROM…)'
      : pm === targetMode ? `currently ${pm.toUpperCase()}`
      : `currently ${pm.toUpperCase()} → will switch to ${targetMode.toUpperCase()} on Save`;
    // Set select value to targetMode without firing 'change' (avoid loop)
    if (modeSelect.value !== targetMode) modeSelect.value = targetMode;
    // Disable radio inputs when target is HOST.
    setRadioFieldsEnabled(targetMode === 'tnc');
    updateButtons();
  }
  function updateButtons(){
    const nsObj = state.nodeCfgState.get()['radio'] || { committed: {}, draft: {} };
    const hasFieldDraft = Object.keys(nsObj.draft).length > 0;
    const pm = persistedMode();
    const modeChanged = (pm != null) && (pm !== targetMode);
    // Save is meaningful when:
    //   - target=TNC AND we need to (re)write fields/conf (mode changed OR drafts)
    //   - target=HOST AND we need to clear conf (mode changed from TNC)
    const anyErr = fieldHandles.some(h => h.hasDraftError());
    const canSave = !anyErr && ((targetMode === 'tnc' && (modeChanged || hasFieldDraft))
                                || (targetMode === 'host' && modeChanged));
    saveBtn.disabled = !canSave;
    saveBtn.classList.toggle('primary', canSave);
    revertBtn.disabled = !hasFieldDraft && !modeChanged;
  }
  function updateFields(){
    for (const h of fieldHandles) h.update();
    updateButtons();
  }
  syncFromState();
  updateFields();

  modeSelect.addEventListener('change', () => { targetMode = modeSelect.value; syncFromState(); });
  saveBtn.onclick = async () => {
    if (!legacy) return;
    const pm = persistedMode();
    try {
      if (targetMode === 'tnc') {
        // Confirm with the user — TNC mode means the device stops responding
        // to KISS at the next boot.
        if (pm !== 'tnc') {
          if (!confirm('Switch to TNC mode? The device will boot into embedded RNS at the next reset and stop responding to KISS on this connection.')) return;
        }
        // Persist any drafted radio fields, then bring the radio online, then CMD_CONF_SAVE.
        const nsObj = state.nodeCfgState.get()['radio'] || { committed:{}, draft:{} };
        if (Object.keys(nsObj.draft).length > 0) {
          await legacy.writeSection('radio', nsObj.draft);
          // Treat drafts as committed.
          state.nodeCfgState.update(s => {
            const obj = s['radio'] || { committed: {}, draft: {} };
            s['radio'] = { committed: { ...obj.committed, ...obj.draft }, draft: {} };
          });
          recomputeHasDraft(NCFG_CTX);
        }
        // Bring the radio online and CMD_CONF_SAVE the current lora_* values
        // to EEPROM. writeSection() above only updates RAM via per-field
        // opcodes; without this, edited values revert on the next reboot.
        // Also sets ADDR_CONF_OK so the device boots into TNC mode. Safe to
        // call even when there were no drafts — covers the mode-change-only case too.
        await legacy.setMode(true);
        state.nodeCfgNeedsReboot.set(true);
        showToast('Radio config persisted (device will boot in TNC mode)', 'warn');
      } else {
        // Target HOST: clear TNC marker. EEPROM radio values stay but ADDR_CONF_OK=0x00.
        if (!confirm('Switch to HOST mode? Cleared TNC config — device boots into HOST (KISS) at the next reset.')) return;
        await legacy.setMode(false);
        state.nodeCfgNeedsReboot.set(true);
        showToast('TNC config cleared — reboot to apply', 'ok');
      }
      // Refresh EEPROM so the persisted-mode indicator updates.
      try { state.nodeCfgEeprom.set(await legacy.readEeprom()); } catch(_) {}
    } catch (e) {
      showToast('Save failed: ' + e.message, 'err');
    }
  };
  revertBtn.onclick = () => {
    state.nodeCfgState.update(s => { if (s['radio']) s['radio'].draft = {}; });
    recomputeHasDraft(NCFG_CTX);
    targetMode = persistedMode() || 'host';
    syncFromState();
  };
  refreshBtn.onclick = () => {
    state.nodeCfgLoaded.update(s => { delete s['radio']; });
    ncfgFetchSection('radio');
    if (legacy) legacy.readEeprom().then(u => state.nodeCfgEeprom.set(u)).catch(()=>{});
  };

  const cleanups = [
    state.nodeCfgEeprom.subscribe(() => {
      // When the EEPROM read lands, default targetMode to what's persisted.
      const pm = persistedMode();
      if (pm != null) targetMode = pm;
      syncFromState();
    }),
    state.nodeCfgState.subscribe(updateFields),
  ];
  return { node: wrap, cleanups };
}
