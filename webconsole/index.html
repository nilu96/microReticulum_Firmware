<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RNode Console</title>
<style>
:root {
  --bg: #f6f7f9;
  --panel: #ffffff;
  --ink: #1d2129;
  --muted: #6a737d;
  --border: #e1e4e8;
  --accent: #2563eb;
  --accent-ink: #ffffff;
  --ok: #15803d;
  --warn: #b45309;
  --err: #b91c1c;
  --hover: rgba(0,0,0,0.04);
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#0f1115; --panel:#161a20; --ink:#e6e8eb; --muted:#8b949e; --border:#2a313a; --accent:#3b82f6; --hover: rgba(255,255,255,0.05); }
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); }
#app { display: flex; flex-direction: column; height: 100vh; min-height: 0; }
.topbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; flex: 0 0 auto; }
.topbar strong { font-size: 14px; }
.topbar select, .topbar input, .topbar button { font: inherit; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); color: var(--ink); }
.topbar button { cursor: pointer; }
.topbar button:disabled { opacity: 0.5; cursor: not-allowed; }
button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.spacer { flex: 1; }
.sep { width: 1px; height: 18px; background: var(--border); }
.pill { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
.st-idle { background: rgba(107,114,128,0.15); color: var(--muted); }
.st-connecting { background: rgba(180,131,9,0.15); color: var(--warn); }
.st-ok { background: rgba(21,128,61,0.15); color: var(--ok); }
.st-err { background: rgba(185,28,28,0.15); color: var(--err); }
.tabbar { display: flex; gap: 2px; padding: 0 12px; background: var(--panel); border-bottom: 1px solid var(--border); overflow-x: auto; flex: 0 0 auto; }
.tab { padding: 8px 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font: inherit; white-space: nowrap; }
.tab:hover:not(:disabled) { color: var(--ink); }
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab:disabled { opacity: 0.4; cursor: not-allowed; }
.body { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.tab-body { flex: 1 1 auto; min-height: 0; padding: 16px; overflow: auto; }
.tab-body.no-pad { padding: 0; }
.tab-body h2 { margin: 0 0 12px; font-size: 16px; }
.tab-body h3 { margin: 16px 0 8px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
/* Namespace panel headings: h2 for the root, descending tags for nested sub-sections.
   depth-1 = section (under root, uppercase + accent bar)
   depth-2 = sub-section (smaller, mixed case, fainter bar)
   depth-3 = sub-sub-section (further indented, dashed bar) */
.tab-body h2.ns-h { margin: 0 0 8px; font-size: 17px; }
.tab-body h3.ns-sub.depth-1 { margin: 22px 0 6px; padding: 4px 0 4px 10px; border-left: 3px solid var(--accent); font-size: 12px; color: var(--ink); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.tab-body h4.ns-sub.depth-2 { margin: 18px 0 6px; padding: 3px 0 3px 10px; border-left: 2px solid rgba(37,99,235,0.5); font-size: 12px; color: var(--ink); font-weight: 600; text-transform: none; letter-spacing: 0; }
.tab-body h5.ns-sub.depth-3 { margin: 14px 0 5px; padding: 2px 0 2px 10px; border-left: 1px dashed var(--muted); font-size: 11px; color: var(--muted); font-weight: 600; text-transform: none; letter-spacing: 0; }
.ns-sub-fields { padding-left: 10px; border-left: 1px dotted rgba(107,114,128,0.18); }
.kv { border-collapse: collapse; }
.kv td { padding: 4px 12px 4px 0; }
.kv td:first-child { color: var(--muted); }
.field { display: grid; grid-template-columns: 220px 1fr; gap: 12px; padding: 8px 0; align-items: center; border-bottom: 1px solid var(--border); }
.field label { color: var(--ink); font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.field input[type=text], .field input[type=number], .field input[type=password], .field textarea, .field select {
  font: inherit; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); color: var(--ink); width: 100%; max-width: 360px;
}
.field.has-err input, .field.has-err textarea, .field.has-err select { border-color: var(--err); }
.field .err { grid-column: 2; color: var(--err); font-size: 12px; min-height: 0; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; line-height: 1.4; }
.badge.ro { background: rgba(107,114,128,0.15); color: var(--muted); }
.badge.wo { background: rgba(180,131,9,0.18); color: var(--warn); }
.badge.secret { background: rgba(180,131,9,0.15); color: var(--warn); }
.badge.reboot { background: rgba(37,99,235,0.15); color: var(--accent); }
.badge.draft { background: rgba(37,99,235,0.15); color: var(--accent); }
.badge.set-only { background: rgba(107,114,128,0.18); color: var(--muted); border: 1px dashed var(--border); padding: 0 5px; }
.set-only-banner { margin: 8px 0 12px; padding: 8px 12px; background: rgba(107,114,128,0.10); border-left: 3px solid var(--muted); color: var(--ink); font-size: 12px; line-height: 1.45; border-radius: 3px; }
/* Read-only info fields — render the value as static text, not an input. */
.field.ro-info .ro-value { font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--ink); padding: 5px 10px; background: rgba(107,114,128,0.08); border-radius: 4px; max-width: 360px; word-break: break-all; white-space: pre-wrap; min-height: 16px; }
.field.ro-info .ro-value.empty { color: var(--muted); font-style: italic; }
/* Write-only command fields — input plus a Send button that fires set+commit. */
.field.wo-action .wo-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.field.wo-action .wo-controls input, .field.wo-action .wo-controls select, .field.wo-action .wo-controls textarea { flex: 1 1 auto; min-width: 180px; max-width: 360px; }
.field.wo-action .wo-send { padding: 5px 14px; background: var(--accent); color: var(--accent-ink); border: 1px solid var(--accent); border-radius: 4px; cursor: pointer; font: inherit; }
.field.wo-action .wo-send:hover:not(:disabled) { opacity: 0.9; }
.field.wo-action .wo-send:disabled { opacity: 0.5; cursor: not-allowed; }
.ns-toolbar { display: flex; gap: 8px; padding-bottom: 12px; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
.ns-toolbar button { font: inherit; padding: 5px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); color: var(--ink); cursor: pointer; }
.ns-toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
.bottombar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--panel); border-top: 1px solid var(--border); flex: 0 0 auto; }
.bottombar button { font: inherit; padding: 6px 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); color: var(--ink); cursor: pointer; }
.bottombar button:disabled { opacity: 0.5; cursor: not-allowed; }
.bottombar button:disabled.primary { background: var(--panel); color: var(--muted); border-color: var(--border); }
.status-sec { margin-bottom: 18px; }
.config-tab { flex: 1 1 auto; min-height: 0; display: flex; padding: 0; overflow: hidden; }
.sidenav { width: 180px; flex: 0 0 auto; border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; background: var(--panel); }
.sidenav-btn { display: block; width: 100%; text-align: left; padding: 8px 16px; background: transparent; border: none; color: var(--ink); cursor: pointer; font: inherit; }
.sidenav-btn:hover { background: var(--hover); }
.sidenav-btn.active { background: var(--accent); color: var(--accent-ink); }
.sidenav-btn .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: 6px; vertical-align: middle; }
.sidenav-btn.active .dot { background: var(--accent-ink); }
.sidenav-detail { flex: 1 1 auto; min-width: 0; min-height: 0; padding: 16px; overflow-y: auto; }
.logs-tab { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; position: relative; padding: 0; }
.logs-toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--panel); border-bottom: 1px solid var(--border); }
.logs-toolbar button { font: inherit; padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); color: var(--ink); cursor: pointer; }
.logs-toolbar button:hover { background: var(--hover); }
.logs { flex: 1 1 auto; min-height: 0; overflow: auto; padding: 8px 12px; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; background: var(--panel); }
.log-line { white-space: pre-wrap; word-break: break-all; }
.follow-pill { position: absolute; bottom: 14px; right: 18px; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--accent); color: var(--accent-ink); cursor: pointer; font: inherit; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.notice { padding: 8px 12px; background: rgba(180,131,9,0.12); color: var(--warn); border-radius: 4px; margin-bottom: 12px; }
.toasts { position: fixed; top: 56px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; pointer-events: none; }
.toast { padding: 10px 14px; background: var(--panel); border: 1px solid var(--border); border-left-width: 3px; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.18); min-width: 220px; max-width: 360px; opacity: 0; transform: translateY(-8px); transition: opacity 0.2s, transform 0.2s; pointer-events: auto; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { border-left-color: var(--ok); }
.toast.err { border-left-color: var(--err); }
.toast.warn { border-left-color: var(--warn); }
.toast.info { border-left-color: var(--accent); }
pre { font: 12px/1.5 ui-monospace, Menlo, monospace; }
/* Node Config */
.kv-info { border-collapse: collapse; }
.kv-info td { padding: 4px 12px 4px 0; vertical-align: top; }
.kv-info td:first-child { color: var(--muted); white-space: nowrap; }
.kv-info td.hash { font: 11px/1.4 ui-monospace, Menlo, monospace; word-break: break-all; max-width: 360px; }
.ncfg-section h2 { margin: 0 0 8px; font-size: 16px; }
.ncfg-trailer { color: var(--muted); font-size: 12px; margin: 8px 0 12px; }
.danger-zone { padding: 12px; border: 1px solid var(--err); border-radius: 4px; margin-top: 16px; background: rgba(185,28,28,0.04); }
.danger-zone h3 { margin: 0 0 8px; color: var(--err); font-size: 13px; text-transform: uppercase; }
.danger-zone button { background: var(--panel); border: 1px solid var(--err); color: var(--err); padding: 6px 14px; border-radius: 4px; font: inherit; cursor: pointer; margin-right: 6px; }
.danger-zone button:hover { background: rgba(185,28,28,0.08); }
.danger-zone button:disabled { opacity: 0.5; cursor: not-allowed; }
.hexview { font: 11px/1.5 ui-monospace, Menlo, monospace; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; overflow: auto; max-height: 480px; }
.hexview .hx-row { display: flex; gap: 12px; }
.hexview .hx-off { color: var(--muted); flex: 0 0 auto; }
.hexview .hx-bytes { flex: 1 1 auto; }
.hexview .hx-ascii { color: var(--muted); flex: 0 0 auto; }
.hexview .hx-mark { background: rgba(37,99,235,0.15); border-radius: 2px; padding: 0 2px; }
.hexview .hx-legend { color: var(--muted); margin-top: 8px; font-size: 11px; }
.hexview .hx-legend .hx-mark { margin-right: 4px; padding: 0 6px; }
.eeprom-toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.eeprom-toolbar button { font: inherit; padding: 5px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); color: var(--ink); cursor: pointer; }
.eeprom-toolbar button:hover { background: var(--hover); }
.eeprom-toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
.bt-mode-row { display: flex; gap: 8px; align-items: center; margin: 12px 0; flex-wrap: wrap; }
.bt-mode-row button { font: inherit; padding: 6px 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); color: var(--ink); cursor: pointer; }
.bt-mode-row button:hover:not(:disabled) { background: var(--hover); }
.bt-mode-row button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.bt-mode-row button:disabled { opacity: 0.5; cursor: not-allowed; }
.mode-current { padding: 10px 14px; background: rgba(37,99,235,0.08); border: 1px solid var(--accent); border-radius: 4px; margin-bottom: 16px; }
/* While auto-reconnecting after Reboot now / transport drop: visually disable
   panel-body controls. nsState / nodeCfgState are preserved across the window
   (see startReconnect) so values stay visible, but edits would be lost when
   the post-reconnect fetch overwrites them. */
body.is-reconnecting input,
body.is-reconnecting select,
body.is-reconnecting textarea,
body.is-reconnecting button.wo-send,
body.is-reconnecting .ns-toolbar button,
body.is-reconnecting .sidenav-detail button {
  pointer-events: none;
  opacity: 0.55;
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts" class="toasts"></div>
<script>
(function(){
'use strict';

// ===== Protocol constants =====
const FEND=0xC0, FESC=0xDB, TFEND=0xDC, TFESC=0xDD;
const CMD_LOG=0x80, CMD_PROVISION_REQ=0x86, CMD_PROVISION_RSP=0x87;
const CMD_RESET=0x55, CMD_RESET_BYTE=0xF8;
const STAT_CMD_RANGE = [0x21, 0x29];

const OP = { GetSchema:1, GetInfo:2, GetCapabilities:3, GetState:4, SetState:5, Commit:6, Discard:7, FactoryReset:8, Reboot:9, Ack:100, Error:101 };
const FT = { None:0, Bool:1, Int:2, Float:3, String:4, Bytes:5, Enum:6, BytesList:7, Void:8 };
// Provisioning field flags (Field.h FF_*). Mutually exclusive uses:
//  - READ_ONLY:  info-only field (e.g. metrics). Server has a getter; client
//                must not draft it. Renders as static value display.
//  - WRITE_ONLY: command field. Setter fires on Commit; value isn't persisted
//                or echoed in GET_STATE. Renders as input + Send button that
//                fires SetState+Commit in a single action. Never enters
//                the namespace draft store.
const FF = { LIVE_APPLY:1, REBOOT_REQUIRED:2, READ_ONLY:4, SECRET:8, WRITE_ONLY:16 };
const ERR_NAMES = { 0:'Ok', 1:'BadRequest', 2:'UnknownOp', 3:'UnknownNs', 4:'UnknownField', 5:'InvalidValue', 6:'Constraint', 7:'ReadOnly', 8:'StorageError', 9:'NotInitialized', 99:'Internal' };
const FK = { Id:1, Name:2, Type:3, Flags:4, MinI:5, MaxI:6, MinF:7, MaxF:8, MaxLen:9, EnumValues:10, EnumLabels:11, Default:12, ElementSize:13, MaxCount:14 };
const IK = { FirmwareVersion:1, SchemaVersion:2, NeedsReboot:3 };
const GK = { NamespaceFilter:1, Pending:2 };
const SK = { Applied:1, DraftHasReboot:2, FieldErrors:3 };
const CK = { Applied:1, NeedsReboot:2 };
const EK = { Code:1, Message:2, Namespace:3, Field:4 };
const RSSI_OFFSET = 157;

// ===== Legacy RNode KISS opcodes (Framing.h) — used by Node Config =====
const CMD_FREQUENCY   = 0x01;
const CMD_BANDWIDTH   = 0x02;
const CMD_TXPOWER     = 0x03;
const CMD_SF          = 0x04;
const CMD_CR          = 0x05;
const CMD_RADIO_STATE = 0x06;
const CMD_RADIO_LOCK  = 0x07;
const CMD_DETECT      = 0x08;
const CMD_IMPLICIT    = 0x09;
const CMD_LEAVE       = 0x0A;
const CMD_ST_ALOCK    = 0x0B;
const CMD_LT_ALOCK    = 0x0C;
const CMD_PROMISC     = 0x0E;
const CMD_DISP_INT    = 0x45;
const CMD_BT_CTRL     = 0x46;
const CMD_BOARD       = 0x47;
const CMD_PLATFORM    = 0x48;
const CMD_MCU         = 0x49;
const CMD_FW_VERSION  = 0x50;
const CMD_ROM_READ    = 0x51;
const CMD_ROM_WRITE   = 0x52;
const CMD_CONF_SAVE   = 0x53;
const CMD_CONF_DELETE = 0x54;
const CMD_DEV_HASH    = 0x56;
const CMD_DEV_SIG     = 0x57;
const CMD_FW_HASH     = 0x58;
const CMD_UNLOCK_ROM  = 0x59;
const ROM_UNLOCK_BYTE = 0xF8;
const CMD_HASHES      = 0x60;
const CMD_BT_PIN      = 0x62;
const CMD_DISP_ADDR   = 0x63;
const CMD_DISP_BLNK   = 0x64;
const CMD_NP_INT      = 0x65;
const CMD_DISP_READ   = 0x66;
const CMD_DISP_ROT    = 0x67;
const CMD_DISP_RCND   = 0x68;
const CMD_DIS_IA      = 0x69;
const CMD_WIFI_MODE   = 0x6A;
const CMD_WIFI_SSID   = 0x6B;
const CMD_WIFI_PSK    = 0x6C;
const CMD_CFG_READ    = 0x6D;
const CMD_WIFI_CHN    = 0x6E;
const CMD_BT_UNPAIR   = 0x70;
const CMD_WIFI_IP     = 0x84;
const CMD_WIFI_NM     = 0x85;
const DETECT_REQ      = 0x73;
const DETECT_RESP     = 0x46;

// Decode tables for the read-only "Device Info" sub-tab (from Boards.h).
const PLATFORM_NAMES = {
  0x60: 'Native', 0x70: 'nRF52', 0x80: 'ESP32', 0x90: 'AVR',
};
const MCU_NAMES = {
  0x61: 'Native', 0x71: 'nRF52840', 0x81: 'ESP32', 0x91: 'ATmega1284P', 0x92: 'ATmega2560',
};
const BOARD_NAMES = {
  0x31:'RNode v1', 0x32:'HMBRW', 0x33:'TTGO T-Beam', 0x34:'Huzzah32', 0x35:'Generic ESP32',
  0x36:'TTGO LoRa32 v2.0', 0x37:'TTGO LoRa32 v2.1', 0x38:'Heltec LoRa32 v2', 0x39:'TTGO LoRa32 v1.0',
  0x3A:'Heltec LoRa32 v3', 0x3B:'LilyGO T-Deck', 0x3C:'Heltec T114', 0x3D:'T-Beam Supreme',
  0x3E:'XIAO ESP32-S3', 0x3F:'Heltec LoRa32 v4', 0x40:'RNode v2.0', 0x41:'RNode v2.1',
  0x42:'T3S3', 0x44:'LilyGO T-Echo', 0x50:'Generic nRF52', 0x51:'WisCore RAK4631', 0x60:'Native Linux',
};
// CONF_OK marker indicating the device boots into TNC mode.
const CONF_OK_BYTE = 0x73;

// ===== Node Config static schema =====
// Each section's fields share the shape Provisioning schema fields use (id, name, type,
// flags, min/max, default), so buildFieldRow can render them. Extra keys carry the
// wire-format details (`cmd`, `encoding`, `queryPayload`) the LegacyClient consumes.
const NCFG_ENC = {
  // Single-byte unsigned (0..255). Query payload: [0xFF] (firmware echoes current value).
  u8: { width: 1, enc: (n) => new Uint8Array([n & 0xff]),
        dec: (b) => b.length >= 1 ? b[0] : null,
        query: () => new Uint8Array([0xFF]) },
  // Single-byte signed (-128..127). Used for TXP.
  i8: { width: 1, enc: (n) => new Uint8Array([n & 0xff]),
        dec: (b) => b.length >= 1 ? (b[0] < 128 ? b[0] : b[0] - 256) : null,
        query: () => new Uint8Array([0xFF]) },
  // 4-byte big-endian unsigned. Used for FREQ, BW. Query payload: 4 zero bytes.
  be32: { width: 4, enc: (n) => { const a = new Uint8Array(4); a[0]=(n>>>24)&0xff; a[1]=(n>>>16)&0xff; a[2]=(n>>>8)&0xff; a[3]=n&0xff; return a; },
          dec: (b) => b.length >= 4 ? (b[0]*0x1000000 + ((b[1]<<16)|(b[2]<<8)|b[3])) : null,
          query: () => new Uint8Array(4) },
  // Null-terminated UTF-8 string. Used for SSID, PSK.
  str: { encStr: (s, maxLen) => {
          const u = new TextEncoder().encode(String(s || ''));
          const len = Math.min(u.length, maxLen);
          const a = new Uint8Array(len + 1);
          a.set(u.subarray(0, len), 0);
          a[len] = 0;
          return a;
        } },
  // 4 octets (IPv4). Used for IP, NETMASK.
  ip4: { enc: (s) => {
          if (!s) return new Uint8Array([0,0,0,0]);
          const parts = String(s).split('.').map(p => parseInt(p, 10));
          const a = new Uint8Array(4);
          for (let i = 0; i < 4; ++i) a[i] = Number.isFinite(parts[i]) ? (parts[i] & 0xff) : 0;
          return a;
        },
         dec: (b) => b.length >= 4 ? `${b[0]}.${b[1]}.${b[2]}.${b[3]}` : null },
};

// FT.String/FT.Int sub-typed via `encoding` field. The LegacyClient picks
// codec by name. `cmd` is the opcode to write (and usually to query).
const NODE_CONFIG_SCHEMA = {
  device_info: {
    label: 'Device Info',
    custom: 'device_info',
  },
  radio: {
    label: 'Radio',
    requiresReboot: true,
    custom: 'radio',
    // Custom panel combines the operating-mode selector (HOST/TNC) with the
    // radio params. Radio config only persists when boot-into-TNC is selected,
    // since in HOST mode the connected host re-issues radio params on every
    // boot and the EEPROM values are unused.
    // Fields defined here so the panel can iterate them via buildFieldRow.
    fields: [
      { id: 'frequency', name: 'frequency', label: 'Frequency', type: FT.Int, encoding: 'be32',
        cmd: CMD_FREQUENCY, minI: 100000000, maxI: 1100000000, unit: 'Hz', default: 0 },
      { id: 'bandwidth', name: 'bandwidth', label: 'Bandwidth', type: FT.Int, encoding: 'be32',
        cmd: CMD_BANDWIDTH, minI: 7800, maxI: 500000, unit: 'Hz', default: 0 },
      { id: 'sf', name: 'sf', label: 'Spreading factor', type: FT.Int, encoding: 'u8',
        cmd: CMD_SF, minI: 5, maxI: 12, default: 0 },
      { id: 'cr', name: 'cr', label: 'Coding rate', type: FT.Int, encoding: 'u8',
        cmd: CMD_CR, minI: 5, maxI: 8, default: 5 },
      { id: 'txp', name: 'txp', label: 'TX power', type: FT.Int, encoding: 'i8',

        this.ws.onmessage = (e) => {
          if (e.data instanceof ArrayBuffer) this.onBytes(new Uint8Array(e.data));
          else if (typeof e.data === 'string') this.onBytes(new TextEncoder().encode(e.data));
        };
        this.ws.onerror = () => { if (!opened) reject(new Error('connect failed')); };
        this.ws.onclose = () => this.onStatus({state: this._userClosing ? 'idle' : 'closed'});
      } catch (e) { this.onStatus({state:'error', info: e.message}); reject(e); }
    });
  }
  // Reconnect using the saved URL. Server-side socket from before the reboot
  // is gone, so we open a brand-new WebSocket.
  async reconnect(){
    if (!this.url) throw new Error('no URL to reconnect');
    this._userClosing = false;
    await this.connect(this.url);
  }
  async send(bytes){ if (this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.send(bytes); }
  async disconnect(){
    this._userClosing = true;
    try { if (this.ws) this.ws.close(); } catch(_) {}
    this.ws = null;
    this.url = null;
    // onclose handler above will fire 'idle' because _userClosing is true.
  }
  // See SerialTransport.forceClose — closes the socket but leaves the URL set
  // so reconnect() can reopen it.
  async forceClose(){
    this._userClosing = false;
    try { if (this.ws) this.ws.close(); } catch(_) {}
    // ws.onclose will fire 'closed' (because _userClosing was reset to false).
  }
}

// ===== RNS-over-MeshChatX transport =====
// Bridges the upper-layer KISS-framed Provisioning protocol to MeshChatX's
// generic rns.link.* WebSocket API, which terminates on an RNS Link to the
// remote node. CMD_PROVISION_REQ frames are unwrapped to rns.link.request
// payloads; the request body comes back, gets re-wrapped as CMD_PROVISION_RSP,
// and is pushed to onBytes so ProvisioningClient sees the exchange unchanged.
class RnsTransport {
  constructor(){
    this.ws = null;
    this.params = null;          // { meshchatxUrl, destinationHash, aspect, autoIdentify }
    this.onBytes = () => {};
    this.onStatus = () => {};
    this._userClosing = false;
    // True once an involuntary close (RNS link_closed broadcast, no_active_link
    // reply, etc.) has fired _handleInvoluntaryClose — keeps the teardown
    // path idempotent under racing signals.
    this._involuntaryClosed = false;
    this._reqIdCounter = 1;
    this._waiters = new Map();   // request_id → { onSuccess(body), onFailure(reason), onPhase?, onProgress? }
    this._pingWaiter = null;     // { resolve, reject, timerId } — for ws-verify ping/pong
    this._kissOut = new KissDecoder((cmd, payload) => this._onOutgoingKissFrame(cmd, payload));
    this._unloadHandler = null;  // bound page-unload listener (attached during connect)
    // Advertised default for ProvisioningClient.request timeouts when this
    // transport is in use. LoRa Resource transfers commonly take 10-30s for
    // schemas; the snappy 5s default used on Serial/BLE/WebSocket times out
    // before the response can land. ProvisioningClient picks this up via
    // duck-typing if the property is set on the transport.
    this.defaultRequestTimeoutMs = 30000;
  }

  // Server phase strings → user-friendly status labels.
  static PHASE_LABELS = {
    finding_path: 'Finding path',
    establishing_link: 'Establishing link',
    identifying: 'Authenticating',
  };

  // Server failure_reason strings → human-friendly error messages.
  static FAILURE_LABELS = {
    no_path_to_destination: 'No path to destination (no announce received yet?)',
    link_establishment_timeout: 'Link establishment timed out',
    no_identity_for_destination: 'Identity not recalled for destination',
    no_local_identity: 'No local identity available on MeshChatX',
    no_active_link: 'Link is not active',
    ws_closed: 'WebSocket disconnected',
    timeout: 'Operation timed out',
    ws_verify_timeout: 'MeshChatX did not respond to ping',
    missing_destination_or_aspect: 'Missing destination hash or aspect',
    invalid_destination_hash: 'Destination hash is not valid hex',
  };
  static _friendlyFailure(reason){
    if (!reason) return 'failure';
    return RnsTransport.FAILURE_LABELS[reason] || reason;
  }
  static available(){ return true; }

  _nextReqId(){ return this._reqIdCounter++; }

  static _b64Encode(bytes){
    let s = '';
    for (let i = 0; i < bytes.length; ++i) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  }
  static _b64Decode(b64){
    if (!b64) return new Uint8Array(0);
    const s = atob(b64);
    const out = new Uint8Array(s.length);
    for (let i = 0; i < s.length; ++i) out[i] = s.charCodeAt(i);
    return out;
  }

  async connect(params){
    this.params = params;
    this._involuntaryClosed = false;
    const { meshchatxUrl, destinationHash, aspect, autoIdentify } = params;
    if (!meshchatxUrl) throw new Error('missing MeshChatX URL');
    if (!destinationHash || !/^[0-9a-fA-F]{32}$/.test(destinationHash))
      throw new Error('destination hash must be 32 hex characters');
    if (!aspect) throw new Error('missing aspect');

    // Stage 1: open the WebSocket to MeshChatX.
    this.onStatus({state:'connecting', info: 'WS connecting'});
    await new Promise((resolve, reject) => {
      try {
        this.ws = new WebSocket(meshchatxUrl);
        let opened = false;
        this.ws.onopen = () => {
          opened = true;
          // Attach unload handlers immediately on WS open. From this point on,
          // a page refresh / tab close can race with an in-flight rns.link.open,
          // and we want a synchronous best-effort teardown to ride along.
          this._attachUnloadHandlers();
          resolve();
        };
        this.ws.onmessage = (e) => this._onWsMessage(e);
        this.ws.onerror = () => { if (!opened) reject(new Error('WebSocket connect failed (check URL / TLS / firewall)')); };
        this.ws.onclose = () => {
          // Fail any in-flight waiters so callers don't hang.
          for (const w of this._waiters.values()) { try { w.onFailure && w.onFailure('ws_closed'); } catch(_) {} }
          this._waiters.clear();
          if (this._pingWaiter) {
            const w = this._pingWaiter; this._pingWaiter = null;
            try { clearTimeout(w.timerId); } catch(_) {}
            try { w.reject(new Error('ws_closed')); } catch(_) {}
          }
          this._detachUnloadHandlers();
          this.onStatus({state: this._userClosing ? 'idle' : 'closed'});
        };
      } catch (e) { this.onStatus({state:'error', info: e.message}); reject(e); }
    });

    // Stage 2: verify the WS is actually a working MeshChatX endpoint
    // (and not, say, a different server that happens to accept WS upgrades)
    // by sending a ping and waiting for a pong. Confirms bidirectional
    // message flow before we commit to the slow Link setup.
    this.onStatus({state:'connecting', info: 'WS verifying'});
    try {
      await this._pingServer(5000);
    } catch (e) {
      const reason = e && e.message === 'timeout' ? 'ws_verify_timeout' : (e.message || 'ws_verify_failed');
      this.onStatus({state:'error', info: RnsTransport._friendlyFailure(reason)});
      try { this.ws && this.ws.close(); } catch(_) {}
      throw new Error(reason);
    }

    // Stage 3: open the Link (and optionally identify) via the MeshChatX backend.
    // The server emits 'phase' events as it makes progress through path discovery,
    // link establishment, and identification — surface them as their friendly labels.
    this.onStatus({state:'connecting', info: 'Link connecting'});
    try {
      const result = await this._sendAndWait('rns.link.open', {
        destination_hash: destinationHash.toLowerCase(),
        aspect,
        auto_identify: !!autoIdentify,
      }, {
        // Idle-timer resets on each phase event (finding_path →
        // establishing_link → identifying), so a server making progress won't
        // trip this even on slow LoRa.
        timeoutMs: 30000,
        onPhase: (phase) => {
          const label = RnsTransport.PHASE_LABELS[phase] || phase;
          this.onStatus({state:'connecting', info: label});
        },
      });
      const ident = result && result.identified ? ' (identified)' : '';
      this.onStatus({state:'connected', info: aspect + ' @ ' + destinationHash.slice(0,8) + ident});
    } catch (e) {
      const reason = (e && e.message) || 'failure';
      this.onStatus({state:'error', info: RnsTransport._friendlyFailure(reason)});
      try { this.ws && this.ws.close(); } catch(_) {}
      throw e;
    }
  }

  // Best-effort synchronous teardown when the page is being unloaded
  // (reload, tab close, navigation). Without this, the server keeps polling
  // path-discovery / link-establishment for an in-flight rns.link.open, may
  // cache a half-finished link, and emits broadcast events to a renderer
  // that's already torn down. We can't await here — the page is dying — but
  // browsers do flush queued WebSocket frames before the connection terminates,
  // so a fire-and-forget rns.link.close + a clean WebSocket.close(1000) gets the
  // message to the server in practice.
  _attachUnloadHandlers(){
    if (this._unloadHandler) return;
    this._unloadHandler = () => {
      try {
        if (this.ws && this.ws.readyState === WebSocket.OPEN && this.params) {
          this.ws.send(JSON.stringify({
            type: 'rns.link.close',
            request_id: this._nextReqId(),
            destination_hash: this.params.destinationHash.toLowerCase(),
            aspect: this.params.aspect,
          }));
          // Status 1000 = normal closure. Without this the browser may emit
          // an abnormal-close (1006) which the server can't distinguish from a
          // network error.
          this.ws.close(1000, 'page-unload');
        }
      } catch (_) { /* page is dying; nothing useful to do */ }
    };
    window.addEventListener('beforeunload', this._unloadHandler);
    window.addEventListener('pagehide', this._unloadHandler);
  }

  _detachUnloadHandlers(){
    if (!this._unloadHandler) return;
    window.removeEventListener('beforeunload', this._unloadHandler);
    window.removeEventListener('pagehide', this._unloadHandler);
    this._unloadHandler = null;
  }

  // Send a {type:"ping"} JSON frame and wait for the matching {type:"pong"}.
  // MeshChatX's main /ws bus has supported this since the WebSocket API was
  // documented (meshchatx_api.md §2.1).
  _pingServer(timeoutMs){
    return new Promise((resolve, reject) => {
      const timerId = setTimeout(() => {
        if (this._pingWaiter && this._pingWaiter.timerId === timerId) {
          this._pingWaiter = null;
          reject(new Error('timeout'));
        }
      }, timeoutMs);
      this._pingWaiter = { resolve, reject, timerId };
      try { this.ws.send(JSON.stringify({type:'ping'})); }
      catch (e) {
        clearTimeout(timerId);
        this._pingWaiter = null;
        reject(e);
      }
    });
  }

  async reconnect(){
    if (!this.params) throw new Error('no params to reconnect');
    this._userClosing = false;
    await this.connect(this.params);
  }

  // The upper layer hands us KISS bytes. Decode the frame; if it's a
  // PROVISION_REQ, unwrap it onto rns.link.request. Other opcodes are silently
  // dropped (legacy KISS / CMD_RESET / etc are not transported over this link).
  async send(bytes){
    this._kissOut.feed(bytes);
  }

  _onOutgoingKissFrame(cmd, payload){
    if (cmd !== CMD_PROVISION_REQ) return;
    const { destinationHash, aspect } = this.params;
    this._sendAndWait('rns.link.request', {
      destination_hash: destinationHash.toLowerCase(),
      aspect,
      path: '/provision',
      data_b64: RnsTransport._b64Encode(payload),
    }, {
      onSuccess: (body) => {
        const respPayload = RnsTransport._b64Decode(body.body_b64 || '');
        const frame = kissEncode(CMD_PROVISION_RSP, respPayload);
        try { this.onBytes(frame); } catch(_) {}
      },
      // Generic failures (timeout, etc.) drop — ProvisioningClient's own
      // request timeout rejects the caller cleanly. But 'no_active_link' is
      // MeshChatX's authoritative "this link is gone" reply: fast-path the
      // transport into the involuntary-close teardown so we surface the drop
      // and (if autoReconnect is on) kick startReconnect right away, rather
      // than waiting for the broadcast / per-request UI timeout. 'ws_closed'
      // is belt-and-suspenders against ws.onclose racing with an in-flight
      // waiter — _handleInvoluntaryClose is idempotent.
      onFailure: (reason) => {
        if (reason === 'no_active_link' || reason === 'ws_closed') {
          this._handleInvoluntaryClose(reason);
        }
      },
    });
  }

  async disconnect(){
    this._userClosing = true;
    if (this.ws && this.ws.readyState === WebSocket.OPEN && this.params) {
      try {
        await this._sendAndWait('rns.link.close', {
          destination_hash: this.params.destinationHash.toLowerCase(),
          aspect: this.params.aspect,
        }, {});
      } catch(_) {}
    }
    try { if (this.ws) this.ws.close(); } catch(_) {}
    this.ws = null;
  }

  async forceClose(){
    this._userClosing = false;
    // Evict MeshChatX's cached link for our (aspect, destination_hash) before
    // tearing down the WS. MeshChatX caches by remote, not by client, and
    // reuses the cache on the next rns.link.open until its own keepalive
    // expires — so after a remote Reboot the rebuilt session would otherwise
    // inherit a stale link that's already dead on the RNS side. Fire-and-
    // forget: browsers flush queued WS frames before close (same pattern as
    // the page-unload handler above), so the close request reaches MeshChatX
    // and we don't have to block on a reply we don't need.
    if (this.ws && this.ws.readyState === WebSocket.OPEN && this.params) {
      try {
        this.ws.send(JSON.stringify({
          type: 'rns.link.close',
          request_id: this._nextReqId(),
          destination_hash: this.params.destinationHash.toLowerCase(),
          aspect: this.params.aspect,
        }));
      } catch(_) {}
    }
    try { if (this.ws) this.ws.close(); } catch(_) {}
  }

  // Fired when the RNS Link or the underlying WS goes down without us asking
  // (MeshChatX link_closed broadcast, no_active_link reply on a request, etc).
  // Fails in-flight waiters immediately so callers don't sit on a 30s
  // ProvisioningClient timeout, then closes the WS — ws.onclose is what
  // actually emits 'closed' onStatus (since _userClosing stays false), which
  // routes through onTransportStatus to startReconnect when autoReconnect is
  // on. Idempotent so concurrent signals (broadcast + request failure +
  // ws.onclose racing during a remote reboot) collapse to one teardown.
  _handleInvoluntaryClose(reason){
    if (this._involuntaryClosed) return;
    this._involuntaryClosed = true;
    for (const w of this._waiters.values()) {
      try { w.onFailure && w.onFailure(reason); } catch(_) {}
    }
    this._waiters.clear();
    try { if (this.ws) this.ws.close(); } catch(_) {}
  }

  // Send a JSON command and return a promise that resolves on the matching
  // {status:"success"} frame and rejects on {status:"failure"} or after
  // timeoutMs of idle (phase/progress events count as activity and reset the
  // idle timer). Optional onPhase/onProgress callbacks consume intermediate
  // frames.
  _sendAndWait(type, body, { onPhase, onProgress, onSuccess, onFailure, timeoutMs = 15000 } = {}){
    const request_id = this._nextReqId();
    const frame = Object.assign({ type, request_id }, body);
    return new Promise((resolve, reject) => {
      let timerId = null;
      const armTimer = () => {
        if (timerId !== null) clearTimeout(timerId);
        timerId = setTimeout(() => {
          if (!this._waiters.has(request_id)) return;
          this._waiters.delete(request_id);
          try { onFailure && onFailure('timeout'); } catch(_) {}
          reject(new Error(type + ' timeout after ' + timeoutMs + 'ms'));
        }, timeoutMs);
      };
      this._waiters.set(request_id, {
        onPhase: (p) => { armTimer(); if (onPhase) try { onPhase(p); } catch(_) {} },
        onProgress: (pr) => { armTimer(); if (onProgress) try { onProgress(pr); } catch(_) {} },
        onSuccess: (msg) => { if (timerId !== null) clearTimeout(timerId); if (onSuccess) try { onSuccess(msg); } catch(_) {} resolve(msg); },
        onFailure: (reason) => { if (timerId !== null) clearTimeout(timerId); if (onFailure) try { onFailure(reason); } catch(_) {} reject(new Error(reason || 'failure')); },
      });
      try { this.ws.send(JSON.stringify(frame)); armTimer(); }
      catch (e) { if (timerId !== null) clearTimeout(timerId); this._waiters.delete(request_id); reject(e); }
    });
  }

  _onWsMessage(e){
    let msg;
    try { msg = JSON.parse(typeof e.data === 'string' ? e.data : new TextDecoder().decode(e.data)); }
    catch (_) { return; }
    if (!msg || typeof msg.type !== 'string') return;

    // ws-verify ping/pong (used during connect() stage 2).
    if (msg.type === 'pong') {
      const w = this._pingWaiter;
      if (w) { this._pingWaiter = null; try { clearTimeout(w.timerId); } catch(_) {} w.resolve(msg); }
      return;
    }
    if (!msg.type.startsWith('rns.link.')) return; // ignore other broadcasts (config, announce, …)

    // Async server-pushed events (no request_id correlation). MeshChatX fires
    // rns.link.event { event: 'link_closed' } from RNS's link_closed_callback —
    // so it covers remote teardowns, RNS-detected link timeouts (e.g. after a
    // remote reboot), and our own teardown alike. (packet_received variants
    // are out of scope — Provisioning is request/response, so unsolicited
    // packets have no consumer yet.)
    if (msg.type === 'rns.link.event') {
      if (msg.event !== 'link_closed') return;
      // The broadcast bus is per-MeshChatX-instance: events for other links
      // (different destination_hash / aspect) share it, so filter to ours.
      const dh = (msg.destination_hash || '').toLowerCase();
      const wantDh = (this.params && this.params.destinationHash || '').toLowerCase();
      if (!wantDh || dh !== wantDh) return;
      if (this.params && msg.aspect !== this.params.aspect) return;
      // Suppress for our own disconnect() — link_closed fires for our
      // outbound rns.link.close too, and we don't want auto-reconnect to
      // engage after the user clicked Disconnect.
      if (this._userClosing) return;
      this._handleInvoluntaryClose('link_closed');
      return;
    }

    const w = this._waiters.get(msg.request_id);
    if (!w) return;
    const status = msg.status;
    if (status === 'phase') { if (w.onPhase) try { w.onPhase(msg.phase); } catch(_) {} return; }
    if (status === 'progress') { if (w.onProgress) try { w.onProgress(msg.progress); } catch(_) {} return; }
    // Terminal frame — drop the waiter.
    this._waiters.delete(msg.request_id);
    if (status === 'success') { w.onSuccess(msg); }
    else { w.onFailure(msg.failure_reason || 'failure'); }
  }
}

// ===== Provisioning client =====
class ProvisioningClient {
  constructor(transport){
    this.t = transport;
    this.seq = 1;
    this.waiters = new Map();
    this.onLog = () => {};
    this.onStatusFrame = () => {};
    // Fallthrough: any KISS opcode we don't recognise here is offered to the
    // LegacyClient (for rnodeconf-style CMD_FREQUENCY, CMD_BT_CTRL, etc).
    this.onLegacyFrame = () => {};
    this.decoder = new KissDecoder((cmd, payload) => this._onFrame(cmd, payload));
    this.t.onBytes = (b) => this.decoder.feed(b);
  }
  _onFrame(cmd, payload){
    if (cmd === CMD_PROVISION_RSP) this._onResponse(payload);
    else if (cmd === CMD_LOG) this.onLog(new TextDecoder().decode(payload));
    else if (cmd >= STAT_CMD_RANGE[0] && cmd <= STAT_CMD_RANGE[1]) this.onStatusFrame(cmd, payload);
    else this.onLegacyFrame(cmd, payload);
  }
  _onResponse(payload){
    let env;
    try { env = new Unpacker(payload).next(); }
    catch (e) { console.error('msgpack decode failed:', e); return; }
    if (!Array.isArray(env) || env.length < 2) return;
    const op = Number(env[0]);
    const seq = Number(env[1]);
    const body = env.length >= 3 ? env[2] : null;
    const w = this.waiters.get(seq);
    if (!w) return;
    this.waiters.delete(seq);
    clearTimeout(w.timeoutId);
    if (op === OP.Error) {
      // Defensive against decoders that hand us a plain Object instead of a
      // Map for int-keyed msgpack maps. Some JS msgpack libs surface int keys
      // as Map entries, others coerce to string-keyed Object — handle both.
      const getF = (key) => {
        if (body instanceof Map) return body.get(key);
        if (body && typeof body === 'object') {
          if (key in body) return body[key];
          const skey = String(key);
          if (skey in body) return body[skey];
        }
        return undefined;
      };
      const msg = getF(EK.Message) || 'Provisioning error';
      const code = getF(EK.Code) ?? 99;
      const codeName = ERR_NAMES[code] || 'Unknown';
      const err = new Error(`${msg} (code ${code} ${codeName})`);
      err.code = code;
      err.codeName = codeName;
      err.message_raw = msg;
      err.ns = getF(EK.Namespace);
      err.field = getF(EK.Field);
      w.reject(err);
    } else {
      w.resolve({ op, body });
    }
  }
  async _request(opId, packPayload, timeoutMs){
    const seq = this.seq++;
    const p = new Packer();
    const has = !!packPayload;
    p.arr(has ? 3 : 2);
    p.int(opId);
    p.int(seq);
    if (has) packPayload(p);
    const frame = kissEncode(CMD_PROVISION_REQ, p.result());
    // Per-call timeout wins; otherwise the transport's advertised default
    // (RnsTransport publishes a longer one because LoRa Resource transfers
    // can take 30+ seconds); final fallback is the snappy 5s default suited
    // to Serial / BLE / WebSocket.
    const transportDefault = (this.t && typeof this.t.defaultRequestTimeoutMs === 'number') ? this.t.defaultRequestTimeoutMs : null;
    const timeout = (timeoutMs != null) ? timeoutMs : (transportDefault != null ? transportDefault : 5000);
    return new Promise((resolve, reject) => {
      const timeoutId = setTimeout(() => {
        this.waiters.delete(seq);
        reject(new Error('Provisioning request timed out (op '+opId+')'));
      }, timeout);
      this.waiters.set(seq, { resolve, reject, timeoutId });
      Promise.resolve(this.t.send(frame)).catch(reject);
    });
  }
  // timeoutMs lets callers override the default 5s — used by the reconnect
  // probe loop, which wants a short timeout so it can retry rapidly while the
  // firmware finishes booting.
  async getInfo(timeoutMs){
    const { body } = await this._request(OP.GetInfo, null, timeoutMs);
    const m = body instanceof Map ? body : new Map();
    return { firmwareVersion: m.get(IK.FirmwareVersion), schemaVersion: m.get(IK.SchemaVersion), needsReboot: !!m.get(IK.NeedsReboot) };
  }
  async getSchema(){
    const { body } = await this._request(OP.GetSchema);
    const namespaces = [];
    if (Array.isArray(body)) {
      for (const nsEntry of body) {
        if (!Array.isArray(nsEntry) || nsEntry.length < 3) continue;
        // Schema v2: namespace entry is [id, name, parent_id, fields]. v1 was
        // [id, name, fields]. Length distinguishes them; parent_id == 0 means
        // root (no parent) in v2.
        const v2 = nsEntry.length >= 4;
        const parentId = v2 ? Number(nsEntry[2] || 0) : 0;
        const fieldsRaw = v2 ? nsEntry[3] : nsEntry[2];
        const fields = [];
        if (Array.isArray(fieldsRaw)) {
          for (const fEntry of fieldsRaw) {
            if (!(fEntry instanceof Map)) continue;
            fields.push({
              id: Number(fEntry.get(FK.Id)),
              name: fEntry.get(FK.Name),
              type: Number(fEntry.get(FK.Type)),
              flags: Number(fEntry.get(FK.Flags) || 0),
              minI: fEntry.get(FK.MinI), maxI: fEntry.get(FK.MaxI),
              minF: fEntry.get(FK.MinF), maxF: fEntry.get(FK.MaxF),
              maxLen: fEntry.get(FK.MaxLen),
              enumValues: fEntry.get(FK.EnumValues), enumLabels: fEntry.get(FK.EnumLabels),
              // BytesList constraints (Type::BytesList only):
              // elementSize = required exact byte length per entry (0 = variable)
              // maxCount    = max number of entries (0 = unlimited)
              elementSize: fEntry.get(FK.ElementSize),
              maxCount: fEntry.get(FK.MaxCount),
              default: fEntry.get(FK.Default),
            });
          }
        }
        namespaces.push({ id: Number(nsEntry[0]), name: String(nsEntry[1]), parentId, fields });
      }
    }
    return { namespaces };
  }
  async getState(nsIds, pending){
    const { body } = await this._request(OP.GetState, (p) => {
      const hasFilter = Array.isArray(nsIds) && nsIds.length > 0;
      const entries = (hasFilter ? 1 : 0) + (pending ? 1 : 0);
      if (entries === 0) { p.nil(); return; }
      p.map(entries);
      if (hasFilter) { p.int(GK.NamespaceFilter); p.arr(nsIds.length); for (const n of nsIds) p.int(n); }
      if (pending) { p.int(GK.Pending); p.bool(true); }
    });
    const out = {};
    if (body instanceof Map) {
      for (const [nsId, fields] of body) {
        const f = {};
        if (fields instanceof Map) for (const [fid, v] of fields) f[Number(fid)] = v;
        out[Number(nsId)] = f;
      }
    }
    return out;
  }
  async setState(stateMap){
    const { body } = await this._request(OP.SetState, (p) => {
      const nsIds = Object.keys(stateMap).map(Number);
      p.map(nsIds.length);
      for (const nsId of nsIds) {
        p.int(nsId);
        const fields = stateMap[nsId];
        const fids = Object.keys(fields).map(Number);
        p.map(fids.length);
        for (const fid of fids) { p.int(fid); packTypedValue(p, fields[fid].type, fields[fid].value); }
      }
    });
    const m = body instanceof Map ? body : new Map();
    const errs = m.get(SK.FieldErrors);
    const fieldErrors = Array.isArray(errs) ? errs.map(e => ({
      ns: Number(e[0]), field: Number(e[1]), code: Number(e[2]), codeName: ERR_NAMES[Number(e[2])] || 'Unknown',
    })) : [];
    return { applied: Number(m.get(SK.Applied) || 0), draftHasReboot: !!m.get(SK.DraftHasReboot), fieldErrors };
  }
  async commit(nsIds){
    const { body } = await this._request(OP.Commit, (p) => {
      if (Array.isArray(nsIds) && nsIds.length > 0) { p.arr(nsIds.length); for (const n of nsIds) p.int(n); }
      else p.nil();
    });
    const m = body instanceof Map ? body : new Map();
    return { applied: Number(m.get(CK.Applied) || 0), needsReboot: !!m.get(CK.NeedsReboot) };
  }
  async discard(nsIds){
    const { body } = await this._request(OP.Discard, (p) => {
      if (Array.isArray(nsIds) && nsIds.length > 0) { p.arr(nsIds.length); for (const n of nsIds) p.int(n); }
      else p.nil();
    });
    const m = body instanceof Map ? body : new Map();
    return { applied: Number(m.get(CK.Applied) || 0) };
  }
  async factoryReset(){
    const { body } = await this._request(OP.FactoryReset);
    const m = body instanceof Map ? body : new Map();
    return { needsReboot: !!m.get(CK.NeedsReboot) };
  }
  // First-class Provisioning reboot — the library sends an Ack before
  // invoking the registered reboot callback, so a healthy device responds.
  // The Ack can still race with the actual reset (especially over slow RNS
  // links), so we use a short per-call timeout and treat *timeout* as
  // success: the request was emitted, the device almost certainly acted on
  // it. The only hard failure we surface is UnknownOp (code 2) — a device
  // too old to know about OP.Reboot — so callers can fall back cleanly to
  // the legacy KISS reset path.
  async requestReboot(){
    try {
      await this._request(OP.Reboot, null, 3000);
    } catch (e) {
      if (e && Number(e.code) === 2) throw e;   // UnknownOp — propagate
      // timeout / connection-lost / link teardown mid-request — assume
      // the reboot fired and let the caller proceed with teardown.
    }
  }
  // Fire-and-forget reset via the legacy RNode KISS reset frame
  // (FEND CMD_RESET CMD_RESET_BYTE FEND). The device reboots immediately,
  // so there is no response — we just send the bytes. Used as the fallback
  // for legacy RNodes that don't implement OP.Reboot.
  async reboot(){
    await this.t.send(kissEncode(CMD_RESET, new Uint8Array([CMD_RESET_BYTE])));
  }
  // Called after the underlying transport reconnects (post-reboot). Clears
  // in-flight waiters that will never be answered and re-syncs the KISS decoder
  // so any half-received frame from before the disconnect doesn't corrupt the
  // first bytes of the new session.
  resetSession(){
    for (const [, w] of this.waiters) {
      clearTimeout(w.timeoutId);
      try { w.reject(new Error('connection lost')); } catch(_) {}
    }
    this.waiters.clear();
    this.decoder = new KissDecoder((cmd, payload) => this._onFrame(cmd, payload));
    this.t.onBytes = (b) => this.decoder.feed(b);
    this.seq = 1;
  }
}
function packTypedValue(p, type, v){
  switch (type) {
    case FT.Bool: p.bool(!!v); return;
    case FT.Int: case FT.Enum: p.int(v); return;
    case FT.Float: p.float(Number(v)); return;
    case FT.String: p.str(String(v == null ? '' : v)); return;
    case FT.Bytes: p.bin(v instanceof Uint8Array ? v : new Uint8Array(v || [])); return;
    case FT.BytesList: {
      // Wire form: MsgPack array of bin entries. JS form: array of Uint8Array.
      const list = Array.isArray(v) ? v : [];
      p.arr(list.length);
      for (const e of list) p.bin(e instanceof Uint8Array ? e : new Uint8Array(e || []));
      return;
    }
    case FT.Void: p.nil(); return;   // Argument-less command marker.
    default: p.nil();
  }
}

// ===== Legacy (rnodeconf-style) client =====
// Speaks individual KISS opcodes for EEPROM-backed settings: radio, bluetooth,
// wifi, display, identity, EEPROM ops. Reuses the same transport/decoder via a
// fallthrough subscription on ProvisioningClient.onLegacyFrame.
class LegacyClient {
  constructor(provisioningClient, transport){
    this.t = transport;
    // cmd → array of pending {resolve, reject, timeoutId} (FIFO). For each
    // incoming frame with that cmd, the oldest pending handler resolves with
    // the payload. Most reads are one-shot, but we use a list to be safe
    // against rapid-fire queries.
    this.pending = new Map();
    provisioningClient.onLegacyFrame = (cmd, payload) => this._onFrame(cmd, payload);
  }
  _onFrame(cmd, payload){
    const q = this.pending.get(cmd);
    if (!q || q.length === 0) return;
    const w = q.shift();
    if (q.length === 0) this.pending.delete(cmd);
    clearTimeout(w.timeoutId);
    w.resolve(payload);
  }
  // Drop all pending queries with "connection lost" — called from
  // ProvisioningClient.resetSession (post-reboot).
  resetSession(){
    for (const [, q] of this.pending) {
      for (const w of q) { clearTimeout(w.timeoutId); try { w.reject(new Error('connection lost')); } catch(_) {} }
    }
    this.pending.clear();
  }
  async write(cmd, payload){
    let p = payload instanceof Uint8Array ? payload : new Uint8Array(payload || []);
    // The firmware's serial dispatcher fires its handlers per-byte INSIDE the
    // frame, not on frame end. For parameterless commands (CMD_CONF_SAVE,
    // CMD_CONF_DELETE, CMD_ROM_READ, CMD_CFG_READ, etc.) the handler is keyed
    // on `command == X` and runs against each payload byte; with a zero-byte
    // payload it never runs. Pad with a single 0x00 sentinel — every such
    // handler ignores the byte's value.
    if (p.length === 0) p = new Uint8Array([0x00]);
    await this.t.send(kissEncode(cmd, p));
  }
  // Query: send the opcode with `queryPayload` and resolve when the device
  // echoes back a frame with the same opcode. Timeout is short by default
  // because most rnodeconf queries respond within tens of ms.
  query(cmd, queryPayload, timeoutMs){
    const timeout = timeoutMs != null ? timeoutMs : 1500;
    return new Promise((resolve, reject) => {
      const w = { resolve, reject };
      w.timeoutId = setTimeout(() => {
        const q = this.pending.get(cmd);
        if (q) {
          const i = q.indexOf(w);
          if (i >= 0) q.splice(i, 1);
          if (q.length === 0) this.pending.delete(cmd);
        }
        reject(new Error('legacy query timed out (cmd 0x'+cmd.toString(16)+')'));
      }, timeout);
      let q = this.pending.get(cmd);
      if (!q) { q = []; this.pending.set(cmd, q); }
      q.push(w);
      Promise.resolve(this.write(cmd, queryPayload)).catch((e) => {
        clearTimeout(w.timeoutId);
        const arr = this.pending.get(cmd);
        if (arr) {
          const i = arr.indexOf(w);
          if (i >= 0) arr.splice(i, 1);
          if (arr.length === 0) this.pending.delete(cmd);
        }
        reject(e);
      });
    });
  }
  // Read one field per the NODE_CONFIG_SCHEMA entry.
  async readField(f){
    if (f.readable === false) return undefined;
    const enc = NCFG_ENC[f.encoding];
    if (!enc || !enc.query) return undefined;
    const reply = await this.query(f.cmd, enc.query(), 1500);
    if (!enc.dec) return undefined;
    const raw = enc.dec(reply);
    return (f.fromWire) ? f.fromWire(raw) : raw;
  }
  // Encode one field value for the wire (does NOT send it).
  encodeField(f, value){
    const enc = NCFG_ENC[f.encoding];
    if (!enc) throw new Error('unknown encoding ' + f.encoding);
    const wireVal = (f.toWire) ? f.toWire(value) : value;
    if (f.encoding === 'str') return enc.encStr(wireVal, f.maxLen || 32);
    if (f.encoding === 'ip4') return enc.enc(wireVal);
    return enc.enc(wireVal);
  }
  // Read all fields in a section. Returns { fieldId: value } map.
  async readSection(sectionId){
    const sec = NODE_CONFIG_SCHEMA[sectionId];
    if (!sec || !sec.fields) return {};
    const out = {};
    for (const f of sec.fields) {
      if (f.readable === false) continue;
      try {
        const v = await this.readField(f);
        if (v !== undefined) out[f.id] = v;
      } catch (_) {
        // Field doesn't reply — skip. UI will show it as empty / default.
      }
    }
    return out;
  }
  // Write only the drafted fields in a section, in saveOrder. Each write is a
  // fire-and-forget KISS frame. The schema may declare:
  //   - saveLeader: array of {cmd, payload} ops fired BEFORE field writes.
  //   - saveTrailer: {cmd, payload} OR array of such ops, fired AFTER field
  //     writes. Used by the radio section to first bring the radio online
  //     (CMD_RADIO_STATE 0x01) and then persist (CMD_CONF_SAVE).
  async writeSection(sectionId, draft){
    const sec = NODE_CONFIG_SCHEMA[sectionId];
    if (!sec || !sec.fields) return;
    if (Array.isArray(sec.saveLeader)) {
      for (const op of sec.saveLeader) await this.write(op.cmd, op.payload || new Uint8Array(0));
    }
    const order = sec.saveOrder || sec.fields.map(f => f.id);
    for (const fid of order) {
      if (!(fid in draft)) continue;
      const f = sec.fields.find(ff => ff.id === fid);
      if (!f) continue;
      const bytes = this.encodeField(f, draft[fid]);
      await this.write(f.cmd, bytes);
    }
    if (sec.saveTrailer) {
      const ops = Array.isArray(sec.saveTrailer) ? sec.saveTrailer : [sec.saveTrailer];
      for (const op of ops) await this.write(op.cmd, op.payload || new Uint8Array(0));
    }
  }
  async readEeprom(){
    // CMD_ROM_READ replies in a single frame with all 200 EEPROM bytes.
    return await this.query(CMD_ROM_READ, new Uint8Array(0), 3000);
  }
  async readCfgSector(){
    return await this.query(CMD_CFG_READ, new Uint8Array(0), 3000);
  }
  async wipeEeprom(){
    await this.write(CMD_UNLOCK_ROM, new Uint8Array([ROM_UNLOCK_BYTE]));
  }
  async setMode(tnc){
    // CMD_CONF_SAVE persists radio settings AND sets ADDR_CONF_OK=0x73 (next
    // boot enters TNC mode). CMD_CONF_DELETE clears that marker.
    // Switching to TNC requires the radio to be online — eeprom_conf_save()
    // short-circuits unless radio_online == true. CMD_CONF_DELETE just clears
    // a byte and doesn't need the radio.
    if (tnc) await this.write(CMD_RADIO_STATE, new Uint8Array([0x01]));
    await this.write(tnc ? CMD_CONF_SAVE : CMD_CONF_DELETE, new Uint8Array(0));
  }
  async setBluetooth(mode){
    // mode: 0=off, 1=on, 2=pairing
    await this.write(CMD_BT_CTRL, new Uint8Array([mode & 0xff]));
  }
  async bluetoothUnpair(){
    await this.write(CMD_BT_UNPAIR, new Uint8Array([0x01]));
  }
  async reconditionDisplay(){
    await this.write(CMD_DISP_RCND, new Uint8Array([0x01]));
  }
  // Read the Device Info sub-tab: board, platform, MCU, firmware version, hashes.
  async readDeviceInfo(){
    const info = {};
    const tryGet = async (cmd, queryPayload, timeout, parser) => {
      try {
        const reply = await this.query(cmd, queryPayload, timeout || 1500);
        return parser ? parser(reply) : reply;
      } catch (_) { return null; }
    };
    info.board    = await tryGet(CMD_BOARD,      new Uint8Array([0]), 1500, (b) => b.length >= 1 ? b[0] : null);
    info.platform = await tryGet(CMD_PLATFORM,   new Uint8Array([0]), 1500, (b) => b.length >= 1 ? b[0] : null);
    info.mcu      = await tryGet(CMD_MCU,        new Uint8Array([0]), 1500, (b) => b.length >= 1 ? b[0] : null);
    // Firmware version: MAJ_VERS and MIN_VERS are emitted as raw bytes which
    // rnodeconf treats as decimal (e.g. MIN_VERS=0x56 → "86", not "56").
    info.fwVersion = await tryGet(CMD_FW_VERSION, new Uint8Array(0), 1500, (b) => b.length >= 2 ? `${b[0]}.${b[1].toString().padStart(2,'0')}` : null);
    info.devHash  = await tryGet(CMD_DEV_HASH,   new Uint8Array([0x01]), 1500, (b) => b);
    // CMD_HASHES: 0x01=target FW, 0x02=actual FW, 0x03=bootloader, 0x04=partition.
    // Each response is 33 bytes: [type_byte, 32 bytes hash]. Use a single query per type.
    // The cmd dispatcher's per-cmd FIFO means concurrent queries on the same cmd
    // would race; serialize them sequentially.
    info.fwHashTarget   = await tryGet(CMD_HASHES, new Uint8Array([0x01]), 1500, (b) => b && b.length >= 33 ? b.slice(1, 33) : null);
    info.fwHashActual   = await tryGet(CMD_HASHES, new Uint8Array([0x02]), 1500, (b) => b && b.length >= 33 ? b.slice(1, 33) : null);
    info.bootloaderHash = await tryGet(CMD_HASHES, new Uint8Array([0x03]), 1500, (b) => b && b.length >= 33 ? b.slice(1, 33) : null);
    info.partitionHash  = await tryGet(CMD_HASHES, new Uint8Array([0x04]), 1500, (b) => b && b.length >= 33 ? b.slice(1, 33) : null);
    return info;
  }
}

// ===== Status decoder =====
function decodeStatusFrame(cmd, payload, st){
  const dv = new DataView(payload.buffer, payload.byteOffset, payload.byteLength);
  st._t = Date.now();
  switch (cmd) {
    case 0x21: if (payload.length>=4) st.rxPackets = dv.getUint32(0,false); break;
    case 0x22: if (payload.length>=4) st.txPackets = dv.getUint32(0,false); break;
    case 0x23: if (payload.length>=1) st.lastRssi = payload[0] - RSSI_OFFSET; break;
    case 0x24: if (payload.length>=1) {
      const raw = payload[0] < 128 ? payload[0] : payload[0] - 256;
      st.lastSnr = raw / 4.0;
    } break;
    case 0x25: if (payload.length>=11) {
      st.airtimeShort = dv.getUint16(0,false) / 10000;
      st.airtimeLong = dv.getUint16(2,false) / 10000;
      st.channelUtilShort = dv.getUint16(4,false) / 10000;
      st.channelUtilLong = dv.getUint16(6,false) / 10000;
      st.currentRssi = payload[8] - RSSI_OFFSET;
      st.noiseFloor = payload[9] - RSSI_OFFSET;
      st.interferenceRssi = payload[10] === 0xFF ? null : (payload[10] - RSSI_OFFSET);
    } break;
    case 0x26: if (payload.length>=12) {
      st.symbolTimeUs = dv.getUint16(0,false);
      st.symbolRate = dv.getUint16(2,false);
      st.preambleSymbols = dv.getUint16(4,false);
      st.preambleTimeMs = dv.getUint16(6,false);
      st.csmaSlotMs = dv.getUint16(8,false);
      st.difsMs = dv.getUint16(10,false);
    } break;
    case 0x27: if (payload.length>=2) { st.batteryState = payload[0]; st.batteryPercent = payload[1]; } break;
    case 0x28: if (payload.length>=3) { st.cwBand = payload[0]; st.cwMin = payload[1]; st.cwMax = payload[2]; } break;
    case 0x29: if (payload.length>=1) {
      // Firmware adds PMU_TEMP_OFFSET=120 to keep negative temps in unsigned
      // range. Sentinel = PMU_TEMP_MIN-1 = -31 → byte 89 means "no reading".
      const t = payload[0] - 120;
      st.temperatureC = (t <= -30) ? null : t;
    } break;
  }
}

// ===== Reactive helper =====
function observable(initial){
  let v = initial;
  const subs = new Set();
  return {
    get: () => v,
    set: (nv) => { v = nv; subs.forEach(s => s(v)); },
    update: (fn) => { fn(v); subs.forEach(s => s(v)); },
    subscribe: (fn) => { subs.add(fn); return () => subs.delete(fn); },
  };
}
// Reflected boolean HTML attributes whose property mirror is the canonical form.
const BOOL_ATTRS = { disabled: 1, checked: 1, readonly: 1, required: 1, hidden: 1, selected: 1, multiple: 1, autofocus: 1 };
function el(tag, attrs, children){
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (BOOL_ATTRS[k]) { e[k] = true; e.setAttribute(k, ''); }
    else if (v === true) e.setAttribute(k, '');
    else e.setAttribute(k, v);
  }
  if (children != null) {
    for (const c of (Array.isArray(children) ? children : [children])) {
      if (c == null || c === false) continue;
      e.appendChild(typeof c === 'object' && c.nodeType ? c : document.createTextNode(String(c)));
    }
  }
  return e;
}

// ===== State =====
const state = {
  transportName: observable('serial'),
  wsUrl: observable('ws://localhost:8080'),
  rnsUrl: observable('wss://127.0.0.1:9337/ws'),
  rnsDestHash: observable(''),
  rnsAspect: observable('rnstransport.remote.management'),
  rnsAutoIdentify: observable(true),
  conn: observable({ state: 'idle' }),
  info: observable(null),
  schema: observable(null),
  activeTab: observable('status'),         // 'status' | 'nodeconfig' | 'config' | 'logs'
  activeNsTab: observable(null),           // ns_id within Configuration tab
  nsState: observable({}),                 // { nsId: { committed:{fid:val}, draft:{fid:val} } }
  nsLoaded: observable({}),                // { nsId: true }
  nsLoading: observable({}),               // { nsId: true } while fetch is in flight
  nsServerErrors: observable({}),
  nodeStatus: observable({}),
  hasDraft: observable(false),
  // True when the firmware holds an uncommitted draft. The per-namespace Save
  // sends edits to the firmware (where they live as a draft); only then does
  // Commit have anything to apply. Discard all also operates on the firmware

  firmwareHasDraft: observable(false),

  // until reboot, so a subsequent getState returns the stale runtime value via
  // the field's getter. Overlaying this map onto `committed` in
  // fetchNamespaceIfNeeded keeps the UI showing what the user actually
  // committed. Auto-trims per field once the device-reported value catches up,
  // and clears on disconnect / discardAll / factoryReset / post-reboot.
  // Shape: { [nsId]: { [fid]: value } }
  pendingRebootOverlay: observable({}),
  autoReconnect: observable(true),
  reconnecting: observable(false),
  // Node Config tab — parallel observables to nsState/etc but for legacy-opcode
  // settings. Keyed by section name ('radio', 'wifi', 'display', …) rather than
  // numeric ns id.
  nodeCfgState: observable({}),
  nodeCfgLoaded: observable({}),
  nodeCfgLoading: observable({}),
  nodeCfgHasDraft: observable(false),
  activeNodeCfgTab: observable('device_info'),
  // Cached EEPROM hex viewer state.
  nodeCfgEeprom: observable(null),       // Uint8Array(200) or null
  nodeCfgCfgSector: observable(null),    // Uint8Array(256) or null
  nodeCfgDeviceInfo: observable(null),   // {board, platform, mcu, fwVersion, ...}

  legacySupported: observable(null),

// Node Config store context — passed to buildFieldRow/setDraftValue/etc.
const NCFG_CTX = {
  get state(){ return state.nodeCfgState; },
  get errors(){ return null; },                // Node Config has no server-side per-field errors
  get hasDraft(){ return state.nodeCfgHasDraft; },
};
let transport = null;
let client = null;
// LegacyClient instance — speaks rnodeconf-style KISS opcodes for Node Config.
// Co-located with `client`; rebuilt in wireClient() on each (re)connect.
let legacy = null;
// When true, the next 'closed' / 'idle' transport event should fully tear down
// state and NOT trigger auto-reconnect. Set by doDisconnect().
let userInitiatedDisconnect = false;
// Set during reboot()/auto-reconnect so we know to attempt re-establishment.
let lastTransportName = null;
// Single in-flight reconnect token. Bumping it cancels the previous attempt.
let reconnectToken = 0;

function createTransport(name){
  if (name === 'serial') return new SerialTransport();
  if (name === 'ble') return new BLETransport();
  if (name === 'ws') return new WebSocketTransport();
  if (name === 'rns') return new RnsTransport();
  throw new Error('unknown transport ' + name);
}

function clearSessionState(){
  state.info.set(null);
  state.schema.set(null);
  state.activeNsTab.set(null);
  state.nsState.set({});
  state.nsLoaded.set({});
  state.nsLoading.set({});
  state.nsServerErrors.set({});
  state.nodeStatus.set({});
  state.hasDraft.set(false);
  state.firmwareHasDraft.set(false);
  state.pendingRebootOverlay.set({});
  // Node Config side
  state.nodeCfgState.set({});
  state.nodeCfgLoaded.set({});
  state.nodeCfgLoading.set({});
  state.nodeCfgHasDraft.set(false);
  state.nodeCfgEeprom.set(null);
  state.nodeCfgCfgSector.set(null);
  state.nodeCfgDeviceInfo.set(null);
  state.nodeCfgNeedsReboot.set(false);
  state.legacySupported.set(null);
}

// Clear the pending-reboot overlay once the device reports needsReboot=false.
// That transition only happens after the device has booted (apply_loaded_to_runtime
// fires the deferred setters) and we've fetched fresh info — at that point the
// getter returns the new value, so the overlay is no longer needed.
let _lastNeedsReboot = false;
state.info.subscribe((info) => {
  const nowNeeds = !!(info && info.needsReboot);
  if (_lastNeedsReboot && !nowNeeds) state.pendingRebootOverlay.set({});
  _lastNeedsReboot = nowNeeds;
});

// Toggle a body class while the auto-reconnect loop is active so CSS can dim
// and disable panel-body controls. The tab-strip already disables tab buttons
// during reconnect; this extends the same affordance to the panel itself so
// the user can't start typing into a field that's about to be overwritten by
// the post-reconnect fetch.
state.reconnecting.subscribe((r) => {
  document.body.classList.toggle('is-reconnecting', !!r);
});

function wireClient(c){
  c.onLog = (text) => {
    const lines = text.split(/\r?\n/).filter(l => l.length > 0);
    for (const l of lines) logsBuffer.push(l);
    while (logsBuffer.length > 1000) logsBuffer.shift();
    logsListeners.forEach(fn => fn(lines));
  };
  c.onStatusFrame = (cmd, payload) => {
    state.nodeStatus.update(st => decodeStatusFrame(cmd, payload, st));
  };
  // Node Config legacy-opcode client subscribes to c.onLegacyFrame (set inside
  // LegacyClient's constructor) and uses the same transport for writes.
  legacy = new LegacyClient(c, c.t);
}

function onTransportStatus(s){
  state.conn.set(s);
  if (s.state === 'idle') {
    // Fully torn down (user-initiated disconnect path).
    client = null; transport = null; legacy = null;
    clearSessionState();
    state.reconnecting.set(false);
  } else if (s.state === 'closed') {
    if (userInitiatedDisconnect || !state.autoReconnect.get() || !transport) {
      // No reconnect: clear session, drop handles.
      client = null; transport = null; legacy = null;
      clearSessionState();
      state.reconnecting.set(false);
    } else {
      // Device went away (probably a reboot); start auto-reconnect.
      startReconnect();
    }
  }
}

async function doConnect(){
  userInitiatedDisconnect = false;
  reconnectToken++;
  const name = state.transportName.get();
  lastTransportName = name;
  try {
    transport = createTransport(name);
    transport.onStatus = onTransportStatus;
    client = new ProvisioningClient(transport);
    wireClient(client);
    if (name === 'ws') await transport.connect(state.wsUrl.get());
    else if (name === 'rns') await transport.connect({
      meshchatxUrl: state.rnsUrl.get(),
      destinationHash: state.rnsDestHash.get(),
      aspect: state.rnsAspect.get(),
      autoIdentify: state.rnsAutoIdentify.get(),
    });
    else await transport.connect();
    await afterConnect();
  } catch (e) {
    console.error('connect failed:', e);
  }
}

async function afterConnect(){
  try { state.info.set(await client.getInfo()); } catch (e) { console.error('getInfo:', e); showToast('Failed to fetch device info: ' + e.message, 'err'); }
  try {
    const schema = await client.getSchema();
    state.schema.set(schema);
    if (schema.namespaces.length > 0 && state.activeNsTab.get() == null) {
      // Default to the first ROOT namespace (parentId == 0) — children render
      // as sub-sections inside their root and aren't selectable on their own.
      const firstRoot = schema.namespaces.find(n => !Number(n.parentId || 0)) || schema.namespaces[0];
      state.activeNsTab.set(firstRoot.id);
    }
  } catch (e) { console.error('getSchema:', e); showToast('Failed to fetch schema: ' + e.message, 'err'); }
  // Probe whether the device responds to legacy (rnodeconf-style) KISS queries.
  // CMD_BOARD is a cheap one-byte query: returns 1 byte board model. In TNC
  // mode the device speaks RNS log over KISS but doesn't service these legacy
  // commands — the probe times out and we hide the Node Config tab.
  if (legacy) {
    legacy.query(CMD_BOARD, new Uint8Array([0x00]), 1500)
      .then(() => state.legacySupported.set(true))
      .catch(() => state.legacySupported.set(false));
  } else {
    state.legacySupported.set(false);
  }
}

async function doDisconnect(){
  userInitiatedDisconnect = true;
  reconnectToken++;            // cancel any in-flight auto-reconnect
  state.reconnecting.set(false);
  if (transport) { try { await transport.disconnect(); } catch(_) {} }
}

// Poll transport.reconnect() (or a fresh WS) with short backoff so we can catch
// early boot logs after a device reset. Driven off a token so doDisconnect or
// a fresh doConnect cancels any prior attempt cleanly.
async function startReconnect(){
  if (!transport && lastTransportName !== 'ws') return;  // nothing to reconnect to
  const myToken = ++reconnectToken;
  state.reconnecting.set(true);
  // Preserve nsState / nodeCfgState across the reconnect window so visible
  // field values don't flash to field.default while the device is rebooting.
  // Only invalidate the *Loaded flags — that triggers re-fetch once the device
  // is back, which then overwrites these maps with fresh data. (Firmware drafts
  // don't survive reboot, so we still reset the local draft-presence flags.)
  state.nsLoaded.set({});
  state.nsServerErrors.set({});
  state.firmwareHasDraft.set(false);
  state.nodeCfgLoaded.set({});
  state.nodeCfgHasDraft.set(false);
  state.nodeCfgEeprom.set(null);
  state.nodeCfgCfgSector.set(null);
  state.nodeCfgDeviceInfo.set(null);
  state.nodeCfgNeedsReboot.set(false);
  const deadline = Date.now() + 30000;
  let delay = 150;
  // Chrome returns "Failed to execute 'open' on 'SerialPort': Failed to open
  // serial port." when the OS-level port handle is unrecoverable — usually
  // after CDC renumeration leaves the saved port reference stale. No amount
  // of retrying will fix it; only navigator.serial.requestPort() will, and
  // that needs a user gesture. Bail out after a few consecutive matches so
  // we surface a "click Connect" prompt instead of spinning for 30s.
  let staleOpenFailures = 0;
  let stalePortBailout = false;
  while (myToken === reconnectToken && Date.now() < deadline && !userInitiatedDisconnect) {
    try {
      if (lastTransportName === 'ws') {
        // WS server-side socket is gone; build a fresh transport+client.
        transport = new WebSocketTransport();
        transport.onStatus = onTransportStatus;
        client = new ProvisioningClient(transport);
        wireClient(client);
        await transport.connect(state.wsUrl.get());
      } else if (lastTransportName === 'rns') {
        // MeshChatX WS is gone; rebuild and re-open the Link.
        transport = new RnsTransport();
        transport.onStatus = onTransportStatus;
        client = new ProvisioningClient(transport);
        wireClient(client);
        await transport.connect({
          meshchatxUrl: state.rnsUrl.get(),
          destinationHash: state.rnsDestHash.get(),
          aspect: state.rnsAspect.get(),
          autoIdentify: state.rnsAutoIdentify.get(),
        });
      } else {
        await transport.reconnect();
        // Serial/BLE reuse the same client instance — clear stale waiters and
        // re-sync the decoder. WS gets a fresh client above, so this is skipped.
        if (client && client.resetSession) client.resetSession();
        if (legacy && legacy.resetSession) legacy.resetSession();
        staleOpenFailures = 0;
      }
      if (myToken !== reconnectToken) return;  // cancelled mid-flight

      // Probe the device with getInfo until it actually responds. On UART
      // bridges the host-side port reopens in <10ms but the firmware is still
      // booting; without this we'd declare success instantly and immediately
      // hit a 5s getInfo timeout. The probe keeps "Reconnecting…" displayed
      // for the real duration of the device-side reboot.
      let info = null;
      let lastProbeErr = null;
      while (myToken === reconnectToken && Date.now() < deadline && !userInitiatedDisconnect) {
        try { info = await client.getInfo(800); break; }
        catch (e) { lastProbeErr = e; await new Promise(r => setTimeout(r, 200)); }
      }
      if (lastProbeErr && !info) console.warn('reconnect probe last error:', lastProbeErr);
      if (myToken !== reconnectToken) return;
      if (!info) throw new Error('device did not respond after reconnect');

      state.info.set(info);
      state.reconnecting.set(false);
      showToast('Reconnected', 'ok');

      // Refresh schema (usually stable across reboot, but cheap to re-fetch).
      try {
        const schema = await client.getSchema();
        state.schema.set(schema);
        if (schema.namespaces.length > 0 && state.activeNsTab.get() == null) {
          const firstRoot = schema.namespaces.find(n => !Number(n.parentId || 0)) || schema.namespaces[0];
          state.activeNsTab.set(firstRoot.id);
        }
      } catch (e) {
        console.error('getSchema after reconnect:', e);
        showToast('Failed to fetch schema: ' + e.message, 'err');
      }
      const cur = state.activeNsTab.get();
      if (cur != null) fetchNamespaceIfNeeded(cur);
      return;
    } catch (e) {
      // Device not back yet — wait and retry with mild backoff.
      const msg = e && e.message ? e.message : String(e);
      console.warn('reconnect attempt failed:', msg);
      if (/Failed to open/i.test(msg) && lastTransportName !== 'ws') {
        if (++staleOpenFailures >= 5) { stalePortBailout = true; break; }
      }
      await new Promise(r => setTimeout(r, delay));
      delay = Math.min(delay + 100, 1000);
    }
  }
  if (myToken !== reconnectToken) return;
  state.reconnecting.set(false);
  if (stalePortBailout) {
    showToast('Serial port handle went stale (device may have renumerated). Click Connect to re-prompt.', 'warn');
  } else if (Date.now() >= deadline) {
    showToast('Auto-reconnect gave up after 30 seconds', 'warn');
  }
  // Treat as fully disconnected.
  client = null; transport = null; legacy = null;
  clearSessionState();
  state.conn.set({ state: 'idle' });
}
async function fetchNamespaceIfNeeded(nsId){

  // the root so the panel can render them as sub-sections.

  if (todo.length === 0) return;
  state.nsLoading.update(s => { for (const id of todo) s[id] = true; });
  try {
    const committedAll = await client.getState(todo, false);
    const mergedAll    = await client.getState(todo, true);
    let firmwareDraftAny = false;
    const overlayCleanups = [];   // deferred mutations to pendingRebootOverlay
    state.nsState.update(s => {
      for (const id of todo) {
        const committed = committedAll[id] || {};
        const merged    = mergedAll[id]    || {};

        // pre-commit runtime value for FF_REBOOT_REQUIRED fields (the setter
        // doesn't fire until apply_loaded_to_runtime on next boot). Substitute
        // the value we committed so the UI shows what the user actually
        // changed. Entries auto-clean once the device-reported value matches
        // the overlay (post-reboot the getter returns the new value).

        // read-only fids up front and exclude them from the diff so the

        for (const c of overlayCleanups) {
          if (Object.keys(c.remaining).length === 0) delete s[c.id];
          else s[c.id] = c.remaining;
        }

    }

    recomputeHasDraft();
  } catch (e) {
    console.error('getState failed:', e);
    showToast('Failed to load ' + nsId + ': ' + e.message, 'err');
  } finally {
    state.nsLoading.update(s => { for (const id of todo) delete s[id]; });
  }
}
function valuesEqual(a, b){
  if (a == null && b == null) return true;
  if (a == null || b == null) return false;
  if (a instanceof Uint8Array && b instanceof Uint8Array) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; ++i) if (a[i] !== b[i]) return false;
    return true;
  }
  // BytesList: array of Uint8Array. Element-wise equality.
  if (Array.isArray(a) && Array.isArray(b)) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; ++i) if (!valuesEqual(a[i], b[i])) return false;
    return true;
  }
  if (typeof a === 'bigint' || typeof b === 'bigint') return BigInt(a) === BigInt(b);
  return a === b;
}
// Context object describing a config store. The Provisioning ("Transport Config")

// keeps existing call sites backwards-compatible.

const _ctxOr = (ctx) => ctx || PROV_CTX;

    // hold a pending draft for this field, drop the local entry — there's
    // truly nothing to save. But if the firmware *does* have a draft for
